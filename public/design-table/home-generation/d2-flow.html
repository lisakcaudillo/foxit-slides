<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compose — Home / Generation · D2 Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;560;600;680&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0b0d12;          /* near-black headline */
    --ink-soft: #353a45;
    --muted: #6b7280;
    --faint: #9aa1ad;
    --line: rgba(13,17,23,0.07);   /* hairline */
    --line-2: rgba(13,17,23,0.10);
    --canvas: #fcfcfd;        /* near-white */
    --surface: #ffffff;
    --violet: #6b3fa0;
    --violet-ink: #5a3490;
    --violet-wash: rgba(107,63,160,0.06);
    --violet-line: rgba(107,63,160,0.18);
    --radius: 12px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "cv11", "ss01";
  }

  /* ── corner label ── */
  .corner-label {
    position: fixed; bottom: 16px; right: 16px; z-index: 999;
    font-size: 11px; letter-spacing: 0.04em; font-weight: 500;
    color: var(--faint);
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    padding: 5px 10px; border-radius: 8px;
  }

  /* ── frame ── */
  .frame {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 64px;
  }

  /* ── top bar: deliberately almost nothing ── */
  .topbar {
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .wordmark {
    display: flex; align-items: center; gap: 9px;
    font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink);
  }
  .wordmark .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--violet);
  }
  .topbar-right { display: flex; align-items: center; gap: 18px; }
  .topbar-right .lnk {
    font-size: 13.5px; color: var(--muted); text-decoration: none; font-weight: 450;
    transition: color 0.18s var(--ease);
  }
  .topbar-right .lnk:hover { color: var(--ink); }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #6b3fa0, #9a6fce);
    color: #fff; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* ── hero region ── */
  .hero {
    padding-top: 92px;
    padding-bottom: 8px;
  }
  .greeting {
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
    color: var(--faint);
    margin: 0 0 14px;
  }
  .headline {
    font-size: 38px; line-height: 1.08; font-weight: 600;
    letter-spacing: -0.025em; color: var(--ink);
    margin: 0 0 40px;
    max-width: 620px;
  }
  .headline em {
    font-style: normal;
    color: var(--violet-ink);
  }

  /* ── prompt card ── */
  .prompt-wrap { max-width: 760px; }
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--line-2);
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(13,17,23,0.03), 0 12px 40px rgba(13,17,23,0.04);
    transition: border-color 0.22s var(--ease), box-shadow 0.22s var(--ease), transform 0.22s var(--ease);
    overflow: hidden;
  }
  .prompt-card.is-focused {
    border-color: var(--violet-line);
    box-shadow: 0 1px 2px rgba(13,17,23,0.03),
                0 18px 50px rgba(107,63,160,0.10),
                0 0 0 4px rgba(107,63,160,0.05);
  }
  .prompt-card.is-generating {
    border-color: var(--violet-line);
  }

  .prompt-body { position: relative; padding: 22px 24px 4px; }
  .prompt-input {
    width: 100%; border: none; outline: none; resize: none;
    font-family: inherit; font-size: 17px; line-height: 1.55;
    color: var(--ink); background: transparent;
    min-height: 76px;
    letter-spacing: -0.005em;
  }
  .prompt-input::placeholder { color: #aab0bb; }

  /* ── action row ── */
  .action-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 14px 18px;
    border-top: 1px solid transparent;
    transition: border-color 0.22s var(--ease);
  }
  .prompt-card.is-focused .action-row,
  .prompt-card.has-text .action-row { border-top-color: var(--line); }

  .action-left { display: flex; align-items: center; gap: 4px; }
  .ghost-btn {
    display: inline-flex; align-items: center; gap: 7px;
    height: 36px; padding: 0 11px;
    border: none; background: transparent; cursor: pointer;
    font-family: inherit; font-size: 13.5px; font-weight: 480; color: var(--muted);
    border-radius: 9px;
    transition: background 0.16s var(--ease), color 0.16s var(--ease);
  }
  .ghost-btn:hover { background: rgba(13,17,23,0.035); color: var(--ink-soft); }
  .ghost-btn svg { width: 16px; height: 16px; }
  .ghost-btn.is-active { color: var(--violet-ink); background: var(--violet-wash); }

  .action-right { display: flex; align-items: center; gap: 14px; }
  .kbd-hint {
    font-size: 11.5px; color: var(--faint); letter-spacing: 0.01em;
    opacity: 0; transition: opacity 0.2s var(--ease);
  }
  .prompt-card.has-text .kbd-hint { opacity: 1; }
  .kbd {
    font-family: inherit; font-size: 10.5px; font-weight: 500;
    border: 1px solid var(--line-2); border-bottom-width: 1.5px;
    border-radius: 5px; padding: 1px 5px; color: var(--muted);
    background: #fbfbfc;
  }

  .generate-btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 38px; padding: 0 18px; border-radius: var(--radius);
    border: none; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 560; letter-spacing: -0.005em;
    background: var(--ink); color: #fff;
    transition: background 0.2s var(--ease), transform 0.12s var(--ease), opacity 0.2s var(--ease);
  }
  .generate-btn:hover { background: #000; }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn[disabled] {
    background: #eceef1; color: #b3b8c0; cursor: not-allowed;
  }
  .generate-btn svg { width: 15px; height: 15px; }

  /* ── customize reveal (progressive disclosure) ── */
  .customize {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.34s var(--ease), opacity 0.26s var(--ease);
    border-top: 1px solid transparent;
  }
  .customize.is-open {
    max-height: 180px;
    opacity: 1;
    border-top-color: var(--line);
  }
  .customize-inner {
    display: flex; gap: 36px;
    padding: 18px 24px 22px;
  }
  .cz-group { display: flex; flex-direction: column; gap: 9px; }
  .cz-label {
    font-size: 11px; font-weight: 560; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--faint);
  }
  .cz-options { display: flex; gap: 6px; }
  .cz-opt {
    font-family: inherit; font-size: 13px; font-weight: 480;
    height: 32px; padding: 0 13px; border-radius: 9px;
    border: 1px solid var(--line-2); background: var(--surface);
    color: var(--ink-soft); cursor: pointer;
    transition: all 0.16s var(--ease);
  }
  .cz-opt:hover { border-color: var(--line-2); background: #fafafb; }
  .cz-opt.is-sel {
    border-color: var(--violet-line);
    background: var(--violet-wash);
    color: var(--violet-ink);
    font-weight: 520;
  }

  /* ── generating overlay state ── */
  .gen-status {
    display: none;
    align-items: center; gap: 12px;
    padding: 18px 24px;
  }
  .prompt-card.is-generating .gen-status { display: flex; }
  .prompt-card.is-generating .prompt-body,
  .prompt-card.is-generating .action-row,
  .prompt-card.is-generating .customize { display: none; }
  .gen-orb {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--violet-line);
    border-top-color: var(--violet);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .gen-text { font-size: 14.5px; color: var(--ink-soft); font-weight: 480; }
  .gen-text b { font-weight: 600; color: var(--ink); }
  .gen-steps { font-size: 12.5px; color: var(--faint); margin-left: 4px; }

  /* ── recent section ── */
  .recent-section { padding-top: 72px; padding-bottom: 96px; }
  .recent-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 24px;
  }
  .recent-title {
    font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink);
    margin: 0;
  }
  .recent-all {
    font-size: 13px; color: var(--muted); text-decoration: none; font-weight: 450;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color 0.18s var(--ease), gap 0.18s var(--ease);
  }
  .recent-all:hover { color: var(--ink); gap: 8px; }

  .recent-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
  }

  /* ── deck tile ── */
  .deck {
    cursor: pointer;
    border-radius: 14px;
    transition: transform 0.26s var(--ease);
  }
  .deck-thumb {
    position: relative;
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: 0 1px 2px rgba(13,17,23,0.03), 0 8px 24px rgba(13,17,23,0.05);
    transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
  }
  .deck:hover .deck-thumb {
    transform: translateY(-4px);
    box-shadow: 0 2px 4px rgba(13,17,23,0.04), 0 18px 44px rgba(13,17,23,0.10);
    border-color: var(--line-2);
  }

  /* mini-slide canvas — each deck's cover, composed in CSS */
  .slide {
    position: absolute; inset: 0;
    padding: 0;
  }
  .slide-pad { position: absolute; inset: 0; padding: 14% 13%; display: flex; flex-direction: column; }

  /* hover affordances */
  .deck-actions {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: rgba(11,13,18,0.0);
    opacity: 0;
    transition: opacity 0.24s var(--ease), background 0.24s var(--ease);
    pointer-events: none;
  }
  .deck:hover .deck-actions {
    opacity: 1;
    background: rgba(11,13,18,0.30);
    pointer-events: auto;
  }
  .deck-act {
    display: inline-flex; align-items: center; gap: 7px;
    height: 34px; padding: 0 15px; border-radius: 10px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(6px);
    border: none; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 540; color: var(--ink);
    transform: translateY(6px);
    transition: transform 0.26s var(--ease), background 0.16s var(--ease);
  }
  .deck:hover .deck-act { transform: translateY(0); }
  .deck-act:nth-child(2) { transition-delay: 0.03s; }
  .deck-act:hover { background: #fff; }
  .deck-act.primary { background: var(--ink); color: #fff; }
  .deck-act.primary:hover { background: #000; }
  .deck-act svg { width: 14px; height: 14px; }

  .deck-meta { padding: 13px 4px 0; }
  .deck-name {
    font-size: 14px; font-weight: 540; letter-spacing: -0.01em; color: var(--ink);
    margin: 0 0 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .deck-sub { font-size: 12.5px; color: var(--faint); font-weight: 450; }

  /* freshly-generated tile slot (revealed by demo) */
  .deck.is-new .deck-thumb { animation: deck-arrive 0.6s var(--ease) both; }
  @keyframes deck-arrive {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .deck.is-placeholder { pointer-events: none; }
  .deck.is-placeholder .deck-thumb {
    background: linear-gradient(110deg, #f4f5f7 8%, #eceef1 18%, #f4f5f7 33%);
    background-size: 220% 100%;
    animation: shimmer 1.3s linear infinite;
    border-style: dashed;
  }
  .deck.is-placeholder .slide,
  .deck.is-placeholder .deck-actions { display: none; }
  .deck.is-placeholder .deck-name {
    width: 60%; height: 12px; border-radius: 4px; background: #eceef1; color: transparent;
  }
  .deck.is-placeholder .deck-sub {
    width: 40%; height: 10px; border-radius: 4px; background: #f1f2f5; color: transparent; margin-top: 6px;
  }
  @keyframes shimmer { to { background-position: -220% 0; } }

  /* rise-in entrance */
  .rise { opacity: 0; transform: translateY(16px); animation: rise 0.6s var(--ease) forwards; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  .d1 { animation-delay: 0.04s; }
  .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.20s; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    .rise { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<div class="corner-label">D2 · Flow &amp; Interaction</div>

<div class="frame">
  <!-- top bar: almost nothing -->
  <div class="topbar">
    <div class="wordmark"><span class="dot"></span>Compose</div>
    <div class="topbar-right">
      <a href="#" class="lnk">Templates</a>
      <a href="#" class="lnk">Compare</a>
      <div class="avatar">L</div>
    </div>
  </div>

  <!-- hero -->
  <section class="hero">
    <p class="greeting rise">Good morning, Lisa</p>
    <h1 class="headline rise d1">What will you <em>make</em> today?</h1>

    <div class="prompt-wrap rise d2">
      <div class="prompt-card" id="card">
        <!-- generating state (hidden until Generate) -->
        <div class="gen-status">
          <div class="gen-orb"></div>
          <div>
            <div class="gen-text"><b id="genTitle">Composing your deck</b></div>
            <div class="gen-steps" id="genStep">Outlining sections…</div>
          </div>
        </div>

        <!-- normal state -->
        <div class="prompt-body">
          <textarea id="prompt" class="prompt-input" rows="2"
            placeholder="Describe the deck you want to create…"></textarea>
        </div>

        <div class="action-row">
          <div class="action-left">
            <button class="ghost-btn" id="czBtn" aria-expanded="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2.2" fill="#fff"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2.2" fill="#fff"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="8" cy="18" r="2.2" fill="#fff"/></svg>
              Customize
            </button>
            <button class="ghost-btn" id="filesBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              Add files
            </button>
          </div>
          <div class="action-right">
            <span class="kbd-hint"><span class="kbd">⌘</span> <span class="kbd">↵</span> to generate</span>
            <button class="generate-btn" id="genBtn" disabled>
              Generate
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>

        <!-- customize reveal -->
        <div class="customize" id="customize">
          <div class="customize-inner">
            <div class="cz-group">
              <span class="cz-label">Audience</span>
              <div class="cz-options" data-group="audience">
                <button class="cz-opt is-sel">Executives</button>
                <button class="cz-opt">Team</button>
                <button class="cz-opt">Clients</button>
              </div>
            </div>
            <div class="cz-group">
              <span class="cz-label">Length</span>
              <div class="cz-options" data-group="length">
                <button class="cz-opt">Short</button>
                <button class="cz-opt is-sel">Standard</button>
                <button class="cz-opt">In-depth</button>
              </div>
            </div>
            <div class="cz-group">
              <span class="cz-label">Detail</span>
              <div class="cz-options" data-group="detail">
                <button class="cz-opt">Concise</button>
                <button class="cz-opt is-sel">Balanced</button>
                <button class="cz-opt">Rich</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- recent decks -->
  <section class="recent-section">
    <div class="recent-head rise d3">
      <h2 class="recent-title">Recent</h2>
      <a href="#" class="recent-all">View all
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>

    <div class="recent-grid" id="grid">
      <!-- tiles injected by JS so the fresh-generate slot can prepend cleanly -->
    </div>
  </section>
</div>

<script>
  /* ───────────────────────────────────────────────────────────
     FLOW & INTERACTION LOGIC
     Demonstrates: focus/empty/typing states, progressive
     customize reveal, ⌘↵, the generate transition, hover deck
     affordances, and a fresh tile arriving after generation.
     ─────────────────────────────────────────────────────────── */

  const card = document.getElementById('card');
  const prompt = document.getElementById('prompt');
  const genBtn = document.getElementById('genBtn');
  const czBtn = document.getElementById('czBtn');
  const customize = document.getElementById('customize');

  /* — empty / typing state drives the Generate button + kbd hint — */
  function syncText() {
    const has = prompt.value.trim().length > 0;
    card.classList.toggle('has-text', has);
    genBtn.disabled = !has;
  }
  prompt.addEventListener('input', () => { autosize(); syncText(); });
  function autosize() {
    prompt.style.height = 'auto';
    prompt.style.height = Math.max(76, prompt.scrollHeight) + 'px';
  }

  /* — focus state: card lifts + accent ring — */
  prompt.addEventListener('focus', () => card.classList.add('is-focused'));
  prompt.addEventListener('blur',  () => card.classList.remove('is-focused'));

  /* — progressive disclosure: Customize reveals audience/length/detail — */
  czBtn.addEventListener('click', () => {
    const open = customize.classList.toggle('is-open');
    czBtn.classList.toggle('is-active', open);
    czBtn.setAttribute('aria-expanded', String(open));
  });

  /* — segmented selects inside Customize — */
  document.querySelectorAll('.cz-options').forEach(grp => {
    grp.addEventListener('click', e => {
      const opt = e.target.closest('.cz-opt'); if (!opt) return;
      grp.querySelectorAll('.cz-opt').forEach(o => o.classList.remove('is-sel'));
      opt.classList.add('is-sel');
    });
  });

  /* — ⌘↵ / Ctrl↵ to generate — */
  prompt.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && !genBtn.disabled) {
      e.preventDefault(); generate();
    }
  });
  genBtn.addEventListener('click', generate);

  /* — the moment of generating: prompt → deck — */
  const steps = ['Outlining sections…', 'Designing layouts…', 'Writing your slides…', 'Polishing…'];
  function generate() {
    if (genBtn.disabled) return;
    const title = (prompt.value.trim().split('\n')[0] || 'Untitled deck').slice(0, 40);
    customize.classList.remove('is-open'); czBtn.classList.remove('is-active');
    card.classList.add('is-generating');

    // 1) drop a shimmering placeholder tile at the head of Recent
    const ph = makePlaceholder();
    grid.insertBefore(ph, grid.firstChild);
    trimGrid();

    // 2) step the status copy for a premium "thinking" cadence
    let i = 0;
    document.getElementById('genStep').textContent = steps[0];
    const iv = setInterval(() => {
      i++;
      if (i < steps.length) document.getElementById('genStep').textContent = steps[i];
    }, 720);

    // 3) resolve → placeholder becomes the real deck, prompt resets calm
    setTimeout(() => {
      clearInterval(iv);
      const real = makeDeck(NEW_DECK(title), true);
      grid.replaceChild(real, ph);
      card.classList.remove('is-generating');
      prompt.value = ''; autosize(); syncText();
    }, 3000);
  }

  function trimGrid() {
    while (grid.children.length > 6) grid.removeChild(grid.lastChild);
  }

  /* ───────────────────────────────────────────────────────────
     MINI SLIDE PREVIEWS — composed in CSS so each cover reads as
     a real designed slide, not a gray box. 6 distinct cover looks.
     ─────────────────────────────────────────────────────────── */

  const DECKS = [
    { name: 'Series A Pitch',          meta: '14 slides · 2h ago',     cover: coverPitch },
    { name: 'Q3 Go-to-Market',         meta: '12 slides · Yesterday',  cover: coverGTM },
    { name: 'Brand Guidelines 2026',   meta: '22 slides · 2d ago',     cover: coverBrand },
    { name: 'Onboarding Playbook',     meta: '9 slides · 3d ago',      cover: coverPlaybook },
    { name: 'Sustainability Report 2026', meta: '18 slides · 5d ago',  cover: coverReport },
    { name: 'Product Launch — Atlas',  meta: '11 slides · 1w ago',     cover: coverLaunch },
  ];

  function NEW_DECK(title) {
    return { name: title, meta: 'just now · 12 slides', cover: coverFresh, fresh: true };
  }

  /* — cover composers: return inner HTML of .slide — */
  // 1 dark editorial pitch cover
  function coverPitch() {
    return `<div class="slide" style="background:#14182a;">
      <div class="slide-pad" style="justify-content:flex-end;">
        <div style="width:22%;height:3px;border-radius:2px;background:#7b5cff;margin-bottom:7%;"></div>
        <div style="font-size:13px;font-weight:680;color:#fff;letter-spacing:-0.02em;line-height:1.1;">Series&nbsp;A</div>
        <div style="font-size:13px;font-weight:680;color:#9a85ff;letter-spacing:-0.02em;line-height:1.1;">Raise</div>
        <div style="margin-top:6%;font-size:7px;color:#7e84a3;letter-spacing:0.04em;">CONFIDENTIAL · 2026</div>
      </div></div>`;
  }
  // 2 violet gradient GTM, two-column hint
  function coverGTM() {
    return `<div class="slide" style="background:linear-gradient(135deg,#6b3fa0,#8b5cf6 70%,#a78bfa);">
      <div class="slide-pad">
        <div style="font-size:6.5px;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:0.06em;">GO-TO-MARKET</div>
        <div style="margin-top:auto;font-size:12.5px;font-weight:640;color:#fff;letter-spacing:-0.015em;line-height:1.12;">Q3 Launch<br>Strategy</div>
        <div style="display:flex;gap:4px;margin-top:8%;">
          <div style="flex:1;height:14px;border-radius:3px;background:rgba(255,255,255,0.22);"></div>
          <div style="flex:1;height:14px;border-radius:3px;background:rgba(255,255,255,0.13);"></div>
          <div style="flex:1;height:14px;border-radius:3px;background:rgba(255,255,255,0.13);"></div>
        </div>
      </div></div>`;
  }
  // 3 clean light brand guidelines, swatch row
  function coverBrand() {
    return `<div class="slide" style="background:#fbfaf8;">
      <div class="slide-pad">
        <div style="font-size:12.5px;font-weight:600;color:#1a1a1a;letter-spacing:-0.02em;line-height:1.1;">Brand<br>Guidelines</div>
        <div style="font-size:7px;color:#9a9a95;margin-top:3px;letter-spacing:0.04em;">2026 EDITION</div>
        <div style="display:flex;gap:5px;margin-top:auto;">
          <div style="width:16px;height:16px;border-radius:4px;background:#6b3fa0;"></div>
          <div style="width:16px;height:16px;border-radius:4px;background:#ff5f00;"></div>
          <div style="width:16px;height:16px;border-radius:4px;background:#14223c;"></div>
          <div style="width:16px;height:16px;border-radius:4px;background:#e8e4dc;"></div>
        </div>
      </div></div>`;
  }
  // 4 warm onboarding, numbered-step feel
  function coverPlaybook() {
    return `<div class="slide" style="background:linear-gradient(160deg,#fff3ea,#ffe3d0);">
      <div class="slide-pad">
        <div style="width:18px;height:18px;border-radius:6px;background:#ff5f00;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;">1</div>
        <div style="margin-top:auto;font-size:12px;font-weight:640;color:#3a2417;letter-spacing:-0.015em;line-height:1.14;">Onboarding<br>Playbook</div>
        <div style="margin-top:7%;display:flex;flex-direction:column;gap:3px;">
          <div style="width:70%;height:3px;border-radius:2px;background:rgba(58,36,23,0.18);"></div>
          <div style="width:52%;height:3px;border-radius:2px;background:rgba(58,36,23,0.12);"></div>
        </div>
      </div></div>`;
  }
  // 5 sustainability report, green-ink chart hint
  function coverReport() {
    return `<div class="slide" style="background:#0f1f17;">
      <div class="slide-pad">
        <div style="font-size:6.5px;font-weight:600;color:#6fd39a;letter-spacing:0.06em;">ANNUAL REPORT</div>
        <div style="display:flex;align-items:flex-end;gap:3px;margin-top:auto;height:30%;">
          <div style="width:7px;background:#2e6b4a;border-radius:2px 2px 0 0;height:45%;"></div>
          <div style="width:7px;background:#3f8d61;border-radius:2px 2px 0 0;height:70%;"></div>
          <div style="width:7px;background:#6fd39a;border-radius:2px 2px 0 0;height:100%;"></div>
        </div>
        <div style="margin-top:8%;font-size:11.5px;font-weight:620;color:#fff;letter-spacing:-0.015em;line-height:1.1;">Sustainability<br>2026</div>
      </div></div>`;
  }
  // 6 product launch, big stat
  function coverLaunch() {
    return `<div class="slide" style="background:linear-gradient(135deg,#1a1530,#2d1b4e);">
      <div class="slide-pad">
        <div style="font-size:6.5px;font-weight:600;color:#b9a3ff;letter-spacing:0.06em;">PRODUCT LAUNCH</div>
        <div style="margin-top:auto;font-size:26px;font-weight:680;color:#fff;letter-spacing:-0.03em;line-height:0.9;">Atlas</div>
        <div style="margin-top:4%;font-size:7.5px;color:#9b8fc4;letter-spacing:0.02em;">The intelligent document workspace</div>
      </div></div>`;
  }
  // fresh-generate cover (violet accent, neutral)
  function coverFresh() {
    return `<div class="slide" style="background:linear-gradient(150deg,#faf8ff,#f1ecfb);">
      <div class="slide-pad">
        <div style="width:16px;height:16px;border-radius:50%;background:var(--violet);opacity:0.9;"></div>
        <div style="margin-top:auto;font-size:11.5px;font-weight:620;color:#2a1d40;letter-spacing:-0.015em;line-height:1.14;">Your new<br>deck</div>
        <div style="margin-top:6%;width:48%;height:3px;border-radius:2px;background:rgba(107,63,160,0.3);"></div>
      </div></div>`;
  }

  /* — build a deck tile with hover affordances — */
  function makeDeck(d, isNew) {
    const el = document.createElement('div');
    el.className = 'deck' + (isNew ? ' is-new' : '');
    el.innerHTML = `
      <div class="deck-thumb">
        ${d.cover()}
        <div class="deck-actions">
          <button class="deck-act primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>Open</button>
          <button class="deck-act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 4 20 12 6 20"/></svg>Present</button>
        </div>
      </div>
      <div class="deck-meta">
        <p class="deck-name">${d.name}</p>
        <div class="deck-sub">${d.meta}</div>
      </div>`;
    return el;
  }

  function makePlaceholder() {
    const el = document.createElement('div');
    el.className = 'deck is-placeholder';
    el.innerHTML = `<div class="deck-thumb"></div>
      <div class="deck-meta"><p class="deck-name">x</p><div class="deck-sub">x</div></div>`;
    return el;
  }

  /* — seed the grid — */
  const grid = document.getElementById('grid');
  DECKS.forEach(d => grid.appendChild(makeDeck(d, false)));

  /* — init — */
  autosize(); syncText();
</script>
</body>
</html>
