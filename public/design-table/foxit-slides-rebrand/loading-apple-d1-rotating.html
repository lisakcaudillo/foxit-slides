<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foxit Slides — Creating</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --g1: #4776E6;
    --g2: #6D28D9;
    --g3: #A855F7;
    --ink: #1a1726;
    --muted: #6b6780;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: radial-gradient(120% 90% at 50% 8%, #ffffff 0%, #faf9fe 46%, #f5f3fb 100%);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* faint ambient glow at the screen edges only */
  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .ambient::before, .ambient::after {
    content: ""; position: absolute; border-radius: 50%;
    filter: blur(90px); opacity: 0.10; will-change: transform, opacity;
  }
  .ambient::before {
    width: 46vw; height: 46vw; left: -16vw; top: -14vw;
    background: radial-gradient(circle, var(--g1), transparent 68%);
    animation: drift1 22s ease-in-out infinite;
  }
  .ambient::after {
    width: 50vw; height: 50vw; right: -18vw; bottom: -18vw;
    background: radial-gradient(circle, var(--g3), transparent 68%);
    animation: drift2 26s ease-in-out infinite;
  }
  @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1);opacity:.09} 50%{transform:translate(4vw,3vw) scale(1.08);opacity:.13} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1);opacity:.08} 50%{transform:translate(-3vw,-3vw) scale(1.1);opacity:.12} }

  /* tiny peripheral chrome: comet mark, top-left */
  .chrome {
    position: fixed; top: 28px; left: 30px;
    display: flex; align-items: center; gap: 9px; z-index: 2;
    opacity: 0; animation: chromeIn 1.2s ease-out 0.3s forwards;
  }
  .chrome .mark {
    width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(135deg, var(--g1), var(--g2) 52%, var(--g3));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px rgba(109, 40, 217, 0.18);
  }
  .chrome .mark svg { width: 13px; height: 13px; display: block; }
  .chrome .word { font-size: 12.5px; font-weight: 500; letter-spacing: 0.04em; color: var(--muted); }
  @keyframes chromeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:.85;transform:translateY(0)} }

  .stage {
    position: relative; z-index: 1; text-align: center; padding: 0 8vw; max-width: 900px;
    opacity: 0; animation: stageIn 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  }
  @keyframes stageIn { from{opacity:0;transform:translateY(8px);filter:blur(2px)} to{opacity:1;transform:translateY(0);filter:blur(0)} }

  /* ── 1) SHIMMERING TEXT — short, static, only shimmers (never rotates) ── */
  .headline {
    font-size: clamp(30px, 5.4vw, 56px);
    font-weight: 600; letter-spacing: -0.025em; line-height: 1.08;
    display: inline-block;
    background: linear-gradient(
      100deg,
      rgba(30,27,45,0.82) 0%, rgba(30,27,45,0.82) 34%,
      var(--g1) 44%, var(--g3) 50%, var(--g2) 56%,
      rgba(30,27,45,0.82) 66%, rgba(30,27,45,0.82) 100%);
    background-size: 280% 100%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: sheen 6.5s cubic-bezier(0.45,0,0.55,1) infinite;
  }
  @keyframes sheen { 0%{background-position:150% 0} 100%{background-position:-150% 0} }

  /* ── 2) ROTATING WORDS — separate line, cycles on a JS timer ── */
  .rotating {
    margin-top: 20px; height: 22px;
    font-size: 15px; font-weight: 400; letter-spacing: 0.01em; color: var(--muted);
    opacity: 1; transition: opacity 0.42s ease;
  }

  /* faint heartbeat dots */
  .pulse { margin: 36px auto 0; display: flex; gap: 7px; justify-content: center; }
  .pulse i {
    width: 5px; height: 5px; border-radius: 50%;
    background: linear-gradient(135deg, var(--g1), var(--g3));
    opacity: 0.25; animation: breathe 2.4s ease-in-out infinite;
  }
  .pulse i:nth-child(2) { animation-delay: 0.28s; }
  .pulse i:nth-child(3) { animation-delay: 0.56s; }
  @keyframes breathe { 0%,100%{opacity:.18;transform:scale(.85)} 50%{opacity:.7;transform:scale(1.15)} }

  @media (prefers-reduced-motion: reduce) {
    .ambient::before, .ambient::after { animation: none; opacity: 0.08; }
    .chrome { animation: none; opacity: 0.85; }
    .stage { animation: none; opacity: 1; transform: none; filter: none; }
    .headline {
      animation: none;
      background: linear-gradient(100deg, var(--g1), var(--g2) 52%, var(--g3));
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .pulse i { animation: none; opacity: 0.4; }
  }
</style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <div class="chrome" aria-hidden="true">
    <span class="mark">
      <svg width="20" height="20" viewBox="0 0 1024 1024" fill="none">
        <path d="M550.92 757.41C541.61 760.4 532.75 763.28 524.24 766.08C523.99 766.17 523.89 766.47 524.03 766.69L576.88 846.16C576.95 846.27 577.08 846.33 577.21 846.33L810.96 846.34C811.27 846.34 811.46 846 811.3 845.73L708.23 673.58C708.12 673.38 707.86 673.32 707.67 673.45C667.43 700.83 625.34 728.47 553.87 756.35L550.92 757.41Z" fill="white"/>
        <path d="M193.26 819.15C193.26 819.15 201.93 654.66 270.55 535.82C339.17 416.98 470.33 323.67 653.06 275.7C653.06 275.7 798.18 240.63 843.13 213.39C843.13 213.39 892.02 180.38 869.94 257.13C869.94 257.13 840.65 331.44 750.35 379.68C729.06 390.83 713.24 393.32 716.58 414.53C722.62 436.09 757.15 419.7 761.89 417.23C770.1 410.15 850.14 387.29 796.81 466.97C743.18 549.5 710.63 624.37 502.42 698.64C363.61 738.25 308.4 760.54 227.96 836.47C187.73 866.24 193.26 819.15 193.26 819.15Z" fill="white"/>
        <path d="M322.48 117.38C329.53 236.44 348.73 261.33 462.1 298.36C343.04 305.41 318.16 324.61 281.12 437.98C274.07 318.92 254.88 294.03 141.5 257C260.56 249.95 285.45 230.75 322.48 117.38Z" fill="white"/>
      </svg>
    </span>
    <span class="word">Foxit&nbsp;Slides</span>
  </div>

  <main class="stage" role="status" aria-live="polite">
    <!-- 1) shimmering, static, short -->
    <h1 class="headline">Creating your slides</h1>
    <!-- 2) rotating words on a timer -->
    <div class="rotating" id="rot">Designing your slides</div>
    <div class="pulse" aria-hidden="true"><i></i><i></i><i></i></div>
  </main>

<script>
  // D2-style word rotation timer — separate from the shimmering headline
  const phrases = [
    "Understanding your topic",
    "Outlining the flow",
    "Writing each slide",
    "Designing the layout",
    "Almost ready"
  ];
  const el = document.getElementById('rot');
  let i = 0;
  setInterval(() => {
    el.style.opacity = '0';
    setTimeout(() => { i = (i + 1) % phrases.length; el.textContent = phrases[i]; el.style.opacity = '1'; }, 420);
  }, 2600);
</script>
</body>
</html>
