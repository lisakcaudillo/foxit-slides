<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foxit Slides — Apple HIG Systematic (D3)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     FOXIT SLIDES — APPLE HIG, SYSTEMATIZED
     Design tokens defined once at :root, consumed everywhere.
     Apple philosophy: deference, material over paint, semantic
     label colors, 8pt spacing, SF-style type scale.
     ============================================================ */

  :root {
    /* ---- SPACING SCALE (4 / 8 / 12 / 16 / 20 / 24) ---- */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;

    /* ---- SEMANTIC LABEL COLORS (Apple system) ---- */
    --label:        #1d1d1f;   /* primary text */
    --label-2:      #6e6e73;   /* secondary text */
    --label-3:      #8e8e93;   /* tertiary text / icons at rest */
    --separator:    rgba(0,0,0,0.07);  /* hairline */

    /* ---- ACCENT (brand violet — selection + primary only) ---- */
    --accent:       #5037C3;
    --accent-fill:  rgba(80,55,195,0.10);  /* selected row wash */
    --accent-fill-2:rgba(80,55,195,0.06);  /* hover wash */

    /* ---- BRAND GRADIENT (logo tile only) ---- */
    --brand-gradient: linear-gradient(135deg, #4776E6 0%, #A855F7 100%);

    /* ---- MATERIALS (vibrancy / translucency tokens) ---- */
    --material-sidebar: rgba(248, 248, 250, 0.62);  /* primary frosted rail */
    --material-thin:    rgba(255, 255, 255, 0.55);  /* glass capsule fill */
    --blur-sidebar: blur(40px) saturate(180%);
    --blur-thin:    blur(20px) saturate(150%);

    /* ---- RADII ---- */
    --radius-row:  9px;
    --radius-cap:  10px;
    --radius-tile: 8px;

    /* ---- TYPE SCALE (SF-style) ---- */
    --type-title:    22px;  --weight-title:    700;  --tracking-title: -0.02em;
    --type-headline: 15px;  --weight-headline: 600;
    --type-body:     13.5px;--weight-body:     500;
    --type-footnote: 11px;  --weight-footnote: 400;

    /* ---- ICON ---- */
    --icon-size: 19px;
    --icon-stroke: 1.6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-6);
    padding: 48px 24px;
    background: #e9e7ee;
  }

  /* ============================================================
     APP WINDOW — frames the rail against a colorful wallpaper
     so the frosted material picks up real color.
     ============================================================ */
  .window {
    width: 1040px;
    max-width: 100%;
    height: 660px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.04),
      0 22px 60px rgba(40,30,80,0.22),
      0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    isolation: isolate;
  }

  /* ---- COLORFUL WALLPAPER (gradient + faint blurred blobs) ---- */
  .wallpaper {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(900px 600px at 8% 10%, #c9d6ff 0%, transparent 60%),
      radial-gradient(800px 700px at 95% 0%, #ffd9ec 0%, transparent 55%),
      linear-gradient(135deg, #eef1fb 0%, #f6eef9 50%, #eef6fb 100%);
  }
  .wallpaper::before,
  .wallpaper::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.55;
  }
  .wallpaper::before {
    width: 320px; height: 320px;
    background: #9db4ff;
    top: -60px; left: 120px;
  }
  .wallpaper::after {
    width: 360px; height: 360px;
    background: #e6a8ff;
    bottom: -80px; left: 60px;
  }

  /* ============================================================
     THE RAIL — translucent vibrancy material
     ============================================================ */
  .rail {
    position: relative;
    z-index: 2;
    width: 272px;
    flex-shrink: 0;
    background: var(--material-sidebar);
    -webkit-backdrop-filter: var(--blur-sidebar);
    backdrop-filter: var(--blur-sidebar);
    border-right: 1px solid var(--separator);
    display: flex;
    flex-direction: column;
    padding: var(--space-5) var(--space-3) var(--space-3);
  }

  /* ---- LOGO LOCKUP ---- */
  .brand {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 0 var(--space-2);
    margin-bottom: var(--space-5);
  }
  .logo-tile {
    width: 30px;
    height: 30px;
    border-radius: var(--radius-tile);
    background: var(--brand-gradient);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 1px 2px rgba(71,90,150,0.30);
  }
  .brand-name {
    font-size: var(--type-headline);
    font-weight: var(--weight-headline);
    color: var(--label);
    letter-spacing: -0.01em;
  }

  /* ---- PRIMARY ACTION (Liquid-Glass capsule) ---- */
  .new-btn {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    width: 100%;
    height: 40px;
    padding: 0 var(--space-4);
    margin-bottom: var(--space-6);
    border: none;
    border-radius: var(--radius-cap);
    cursor: pointer;
    font-family: inherit;
    font-size: var(--type-body);
    font-weight: 600;
    color: var(--accent);
    /* Liquid-Glass: translucent fill + specular top edge */
    background:
      linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.18) 100%),
      var(--accent-fill);
    -webkit-backdrop-filter: var(--blur-thin);
    backdrop-filter: var(--blur-thin);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.85),
      inset 0 0 0 1px rgba(80,55,195,0.16),
      0 1px 2px rgba(80,55,195,0.10);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .new-btn:hover {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      inset 0 0 0 1px rgba(80,55,195,0.26),
      0 2px 6px rgba(80,55,195,0.16);
  }
  .new-btn:active { transform: scale(0.985); }
  .new-btn svg { stroke: var(--accent); }

  /* ---- SECTION LABEL ---- */
  .section-label {
    font-size: var(--type-footnote);
    font-weight: 600;
    color: var(--label-3);
    letter-spacing: 0.02em;
    padding: 0 var(--space-3);
    margin-bottom: var(--space-2);
  }

  /* ---- NAV ---- */
  nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    height: 38px;
    padding: 0 var(--space-3);
    border-radius: var(--radius-row);
    cursor: pointer;
    color: var(--label-2);
    transition: background 0.12s ease, color 0.12s ease;
  }
  .nav-item .ic { color: var(--label-3); transition: color 0.12s ease; }
  .nav-item .lbl {
    font-size: var(--type-body);
    font-weight: var(--weight-body);
    letter-spacing: -0.005em;
  }
  .nav-item:hover { background: var(--accent-fill-2); }
  .nav-item.selected {
    background: var(--accent-fill);
    color: var(--accent);
  }
  .nav-item.selected .ic { color: var(--accent); }
  .nav-item.selected .lbl { font-weight: 600; }

  /* ---- BOTTOM ACCOUNT DOCK ---- */
  .spacer { flex: 1; }
  .dock {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    height: 52px;
    padding: 0 var(--space-3);
    border-radius: var(--radius-row);
    cursor: pointer;
    margin-top: var(--space-3);
    border-top: 1px solid var(--separator);
    border-radius: 0;
    padding-top: var(--space-3);
    transition: background 0.12s ease;
  }
  .dock:hover { background: var(--accent-fill-2); }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6e6e73 0%, #3a3a3c 100%);
    color: #fff;
    font-size: var(--type-footnote);
    font-weight: 600;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .dock-meta { display: flex; flex-direction: column; gap: 1px; line-height: 1.25; }
  .dock-name { font-size: var(--type-body); font-weight: 600; color: var(--label); }
  .dock-org  { font-size: var(--type-footnote); font-weight: 400; color: var(--label-3); }
  .dock-chev { margin-left: auto; color: var(--label-3); }

  /* ============================================================
     CONTENT AREA — faint slide cards (content is the hero)
     ============================================================ */
  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    padding: var(--space-6) 32px;
    overflow: hidden;
  }
  .content-head {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-6);
  }
  .content-title {
    font-size: var(--type-title);
    font-weight: var(--weight-title);
    letter-spacing: var(--tracking-title);
    color: var(--label);
  }
  .content-sub {
    font-size: var(--type-body);
    font-weight: var(--weight-body);
    color: var(--label-2);
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-5);
  }
  .slide-card {
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    background: rgba(255,255,255,0.66);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border: 1px solid var(--separator);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    padding: var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }
  .sc-bar { height: 7px; border-radius: 3px; background: rgba(29,29,31,0.10); }
  .sc-bar.t { width: 62%; height: 9px; background: rgba(29,29,31,0.16); }
  .sc-bar.s { width: 90%; }
  .sc-bar.s2 { width: 76%; }
  .sc-thumb {
    margin-top: auto;
    height: 38%;
    border-radius: 7px;
    background: linear-gradient(135deg, rgba(71,118,230,0.14), rgba(168,85,247,0.14));
  }

  /* ============================================================
     TOKENS FOOTER STRIP — signs this as system output
     ============================================================ */
  .tokens {
    width: 1040px;
    max-width: 100%;
    display: flex;
    align-items: center;
    gap: var(--space-6);
    padding: var(--space-3) var(--space-5);
    border-radius: 12px;
    background: rgba(255,255,255,0.5);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border: 1px solid var(--separator);
    flex-wrap: wrap;
  }
  .tok-group { display: flex; align-items: center; gap: var(--space-2); }
  .tok-cap {
    font-size: var(--type-footnote);
    font-weight: 600;
    color: var(--label-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .swatch {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1px solid var(--separator);
    flex-shrink: 0;
  }
  .sw-material {
    background: var(--material-sidebar);
    -webkit-backdrop-filter: var(--blur-sidebar);
    backdrop-filter: var(--blur-sidebar);
    background-image: linear-gradient(135deg, #c9d6ff, #ffd9ec);
  }
  .sw-label   { background: var(--label); }
  .sw-label2  { background: var(--label-2); }
  .sw-label3  { background: var(--label-3); }
  .sw-accent  { background: var(--accent); }
  .sw-gradient{ background: var(--brand-gradient); }
  .tok-divider { width: 1px; height: 22px; background: var(--separator); }
  .specimen { display: flex; align-items: baseline; gap: var(--space-3); }
  .spec-title    { font-size: var(--type-title);    font-weight: var(--weight-title);    color: var(--label); letter-spacing: var(--tracking-title); }
  .spec-headline { font-size: var(--type-headline); font-weight: var(--weight-headline); color: var(--label); }
  .spec-body     { font-size: var(--type-body);     font-weight: var(--weight-body);     color: var(--label-2); }
  .spec-foot     { font-size: var(--type-footnote); font-weight: var(--weight-footnote); color: var(--label-3); }
  .tok-name { font-size: var(--type-footnote); color: var(--label-3); font-weight: 500; }
</style>
</head>
<body>

  <!-- ===================== APP WINDOW ===================== -->
  <div class="window">
    <div class="wallpaper"></div>

    <!-- ===== LEFT NAVIGATION RAIL (the deliverable) ===== -->
    <aside class="rail">

      <!-- Logo lockup -->
      <div class="brand">
        <div class="logo-tile">
          <svg width="16" height="16" viewBox="0 0 1024 1024" fill="none"><path d="M550.92 757.41C541.61 760.4 532.75 763.28 524.24 766.08C523.99 766.17 523.89 766.47 524.03 766.69L576.88 846.16C576.95 846.27 577.08 846.33 577.21 846.33L810.96 846.34C811.27 846.34 811.46 846 811.3 845.73L708.23 673.58C708.12 673.38 707.86 673.32 707.67 673.45C667.43 700.83 625.34 728.47 553.87 756.35L550.92 757.41Z" fill="white"/><path d="M193.26 819.15C193.26 819.15 201.93 654.66 270.55 535.82C339.17 416.98 470.33 323.67 653.06 275.7C653.06 275.7 798.18 240.63 843.13 213.39C843.13 213.39 892.02 180.38 869.94 257.13C869.94 257.13 840.65 331.44 750.35 379.68C729.06 390.83 713.24 393.32 716.58 414.53C722.62 436.09 757.15 419.7 761.89 417.23C770.1 410.15 850.14 387.29 796.81 466.97C743.18 549.5 710.63 624.37 502.42 698.64C363.61 738.25 308.4 760.54 227.96 836.47C187.73 866.24 193.26 819.15 193.26 819.15Z" fill="white"/><path d="M322.48 117.38C329.53 236.44 348.73 261.33 462.1 298.36C343.04 305.41 318.16 324.61 281.12 437.98C274.07 318.92 254.88 294.03 141.5 257C260.56 249.95 285.45 230.75 322.48 117.38Z" fill="white"/></svg>
        </div>
        <span class="brand-name">Foxit Slides</span>
      </div>

      <!-- Primary action: Liquid-Glass capsule -->
      <button class="new-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Presentation
      </button>

      <!-- Section -->
      <div class="section-label">Workspace</div>

      <nav>
        <!-- Home (selected) -->
        <div class="nav-item selected">
          <svg class="ic" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-6h5v6"/></svg>
          <span class="lbl">Home</span>
        </div>

        <!-- Studio (slides-only) -->
        <div class="nav-item">
          <svg class="ic" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M9 21h6"/><path d="M12 17v4"/></svg>
          <span class="lbl">Studio</span>
        </div>
      </nav>

      <div class="spacer"></div>

      <!-- Account dock -->
      <div class="dock">
        <div class="avatar">LC</div>
        <div class="dock-meta">
          <span class="dock-name">Lisa Caudillo</span>
          <span class="dock-org">Foxit</span>
        </div>
        <svg class="dock-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
      </div>
    </aside>

    <!-- ===== CONTENT AREA (faint slide cards) ===== -->
    <main class="content">
      <div class="content-head">
        <span class="content-title">Home</span>
        <span class="content-sub">Recent presentations</span>
      </div>
      <div class="card-grid">
        <div class="slide-card"><div class="sc-bar t"></div><div class="sc-bar s"></div><div class="sc-bar s2"></div><div class="sc-thumb"></div></div>
        <div class="slide-card"><div class="sc-bar t"></div><div class="sc-bar s"></div><div class="sc-bar s2"></div><div class="sc-thumb"></div></div>
        <div class="slide-card"><div class="sc-bar t"></div><div class="sc-bar s"></div><div class="sc-bar s2"></div><div class="sc-thumb"></div></div>
        <div class="slide-card"><div class="sc-bar t"></div><div class="sc-bar s"></div><div class="sc-bar s2"></div><div class="sc-thumb"></div></div>
        <div class="slide-card"><div class="sc-bar t"></div><div class="sc-bar s"></div><div class="sc-bar s2"></div><div class="sc-thumb"></div></div>
        <div class="slide-card"><div class="sc-bar t"></div><div class="sc-bar s"></div><div class="sc-bar s2"></div><div class="sc-thumb"></div></div>
      </div>
    </main>
  </div>

  <!-- ===================== TOKENS FOOTER ===================== -->
  <div class="tokens">
    <div class="tok-group">
      <span class="tok-cap">Material</span>
      <div class="swatch sw-material" title="--material-sidebar"></div>
    </div>
    <div class="tok-divider"></div>
    <div class="tok-group">
      <span class="tok-cap">Label</span>
      <div class="swatch sw-label"  title="--label #1d1d1f"></div>
      <div class="swatch sw-label2" title="--label-2 #6e6e73"></div>
      <div class="swatch sw-label3" title="--label-3 #8e8e93"></div>
    </div>
    <div class="tok-divider"></div>
    <div class="tok-group">
      <span class="tok-cap">Accent</span>
      <div class="swatch sw-accent" title="--accent #5037C3"></div>
      <div class="swatch sw-gradient" title="--brand-gradient (logo only)"></div>
    </div>
    <div class="tok-divider"></div>
    <div class="tok-group specimen">
      <span class="spec-title">Aa</span>
      <span class="spec-headline">Headline</span>
      <span class="spec-body">Body</span>
      <span class="spec-foot">Footnote</span>
    </div>
    <div class="tok-divider"></div>
    <span class="tok-name">Foxit Slides · Apple HIG system tokens</span>
  </div>

</body>
</html>
