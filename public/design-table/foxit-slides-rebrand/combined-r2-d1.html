<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foxit Slides — Combined R2 / D1 (Material & Separation)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;590;680&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Apple label colors */
    --label-primary: #1d1d1f;
    --label-secondary: #6e6e73;
    --label-tertiary: #8e8e93;
    --label-quaternary: #b0b0b6;

    /* single restrained accent (violet-600) */
    --accent: #5037C3;
    --accent-tint: rgba(80, 55, 195, 0.10);
    --accent-tint-hover: rgba(80, 55, 195, 0.05);

    /* hairline depth */
    --hairline: rgba(0, 0, 0, 0.07);
    --hairline-soft: rgba(0, 0, 0, 0.045);
    --hairline-faint: rgba(0, 0, 0, 0.035);

    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;

    /* 8pt rhythm */
    --r1: 8px; --r2: 16px; --r3: 24px; --r4: 32px;
  }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important } }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: #dcd8e8;
    color: var(--label-primary);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  /* ============ App window ============ */
  .window {
    position: relative;
    width: 1120px;
    height: 720px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.04),
      0 24px 64px -14px rgba(40, 30, 80, 0.40),
      0 2px 8px rgba(0,0,0,0.09);
    isolation: isolate;
  }

  /* CALM everyday wallpaper — soft, gentle, NOT saturated blobs.
     Just enough hue variation for the frosted rail to pick up color. */
  .wallpaper {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(640px 460px at 12% 6%,  rgba(120,140,235,0.16), transparent 64%),
      radial-gradient(620px 520px at 90% 96%, rgba(168,130,235,0.15), transparent 64%),
      radial-gradient(460px 380px at 74% 10%, rgba(240,190,228,0.13), transparent 66%),
      linear-gradient(158deg, #f4f1fb 0%, #f1eefb 46%, #f7f0fa 78%, #eff3fc 100%);
    z-index: 0;
  }
  /* faint soft glow tiles instead of heavy blobs */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(72px);
    pointer-events: none;
  }
  .glow.g1 { width: 380px; height: 380px; left: -80px; top: 90px;
    background: radial-gradient(circle at 40% 40%, rgba(150,140,235,0.30), transparent 70%); }
  .glow.g2 { width: 420px; height: 420px; right: -110px; top: -70px;
    background: radial-gradient(circle at 50% 50%, rgba(140,165,235,0.26), transparent 70%); }
  .glow.g3 { width: 300px; height: 300px; right: 240px; bottom: -110px;
    background: radial-gradient(circle at 50% 50%, rgba(238,180,215,0.22), transparent 70%); }

  /* traffic-light window controls */
  .traffic {
    position: absolute;
    top: 18px; left: 20px;
    display: flex; gap: 8px;
    z-index: 5;
  }
  .traffic span { width: 12px; height: 12px; border-radius: 50%; display: block;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }
  .traffic .c1 { background: #ff5f57; }
  .traffic .c2 { background: #febc2e; }
  .traffic .c3 { background: #28c840; }

  /* layout: inset/floating sidebar + floating content */
  .layout {
    position: absolute;
    inset: 0;
    display: flex;
    gap: 0;
    padding: 12px;
    padding-top: 44px;        /* clear the traffic lights */
    z-index: 2;
  }

  /* ============ THE RAIL — the jewel.
     Most refined glass: deep translucent vibrancy material, a top specular
     sheen, a luminous inner top-edge, and a whisper of inner shadow at the
     base so the panel reads as a single piece of carved frosted glass. ======= */
  .rail {
    position: relative;
    width: 248px;
    flex: 0 0 248px;
    border-radius: 16px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.0) 22%),
      rgba(251, 250, 255, 0.58);
    -webkit-backdrop-filter: blur(40px) saturate(190%);
    backdrop-filter: blur(40px) saturate(190%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.85),          /* luminous top edge */
      inset 0 0 0 0.5px rgba(255,255,255,0.45),       /* glass rim */
      inset 0 0 0 1px var(--hairline-faint),          /* hairline structure */
      inset 0 -22px 32px -28px rgba(40, 30, 80, 0.16);/* soft base settle */
    display: flex;
    flex-direction: column;
    padding: 14px 13px 12px;
    overflow: hidden;
  }
  /* a single specular streak across the top — the "jewel" catch-light */
  .rail::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56%;
    background: linear-gradient(160deg, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.06) 34%, transparent 60%);
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* ── ZONE 1 · BRAND ── */
  .brand {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 6px 2px;
  }
  .logo-tile {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, #4776E6, #A855F7);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(70, 40, 160, 0.28), inset 0 0.5px 0 rgba(255,255,255,0.45);
    flex: 0 0 30px;
  }
  .brand-name {
    font-size: 15px;
    font-weight: 590;
    letter-spacing: -0.012em;
    color: var(--label-primary);
  }

  /* a refined glass divider used between major zones — luminous over shadow */
  .zone-rule {
    position: relative;
    height: 1px;
    margin: 13px 4px;
    background: var(--hairline);
  }
  .zone-rule::after {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 1px;
    height: 0.5px;
    background: rgba(255,255,255,0.7);
  }

  /* ── ZONE 2 · PRIMARY ACTION — Liquid Glass capsule ── */
  .new-btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border: none;
    border-radius: 11px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 590;
    letter-spacing: -0.006em;
    color: var(--accent);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.70), rgba(255,255,255,0.30)),
      rgba(80, 55, 195, 0.06);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    backdrop-filter: blur(14px) saturate(160%);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.95),
      inset 0 0 0 0.5px rgba(80,55,195,0.18),
      0 4px 14px rgba(80, 55, 195, 0.14),
      0 1px 2px rgba(20, 9, 50, 0.06);
    transition: transform 0.18s cubic-bezier(0.2,0.7,0.3,1), box-shadow 0.18s ease, background 0.18s ease;
  }
  .new-btn::after {
    /* specular top edge highlight */
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 11px;
    background: linear-gradient(120deg, rgba(255,255,255,0.55) 0%, transparent 28%, transparent 72%, rgba(255,255,255,0.24) 100%);
    pointer-events: none;
    mix-blend-mode: screen;
  }
  .new-btn:hover {
    transform: translateY(-1px);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.36)),
      rgba(80, 55, 195, 0.09);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,1),
      inset 0 0 0 0.5px rgba(80,55,195,0.26),
      0 8px 22px rgba(80, 55, 195, 0.20),
      0 1px 2px rgba(20, 9, 50, 0.08);
  }
  .new-btn:active { transform: translateY(0); }
  .new-btn svg { flex: 0 0 17px; }

  /* ── ZONE 3 · SEARCH — quiet, recessed glass well ── */
  .search {
    position: relative;
    margin-top: 14px;
  }
  .search input {
    width: 100%;
    height: 32px;
    padding: 0 10px 0 31px;
    border: none;
    border-radius: 9px;
    font-family: inherit;
    font-size: 13px;
    color: var(--label-primary);
    background: rgba(118, 118, 128, 0.09);
    box-shadow:
      inset 0 0.5px 1px rgba(20, 9, 50, 0.06),
      inset 0 0 0 0.5px var(--hairline-soft);
    outline: none;
    transition: background 0.15s ease, box-shadow 0.15s ease;
  }
  .search input::placeholder { color: var(--label-tertiary); }
  .search input:focus {
    background: rgba(255,255,255,0.72);
    box-shadow: inset 0 0 0 0.5px var(--hairline), 0 0 0 3px rgba(80,55,195,0.12);
  }
  .search svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--label-tertiary);
    pointer-events: none;
  }

  /* ── section label ── */
  .section-label {
    font-size: 11px;
    font-weight: 590;
    letter-spacing: 0.02em;
    color: var(--label-tertiary);
    padding: 0 9px;
    margin-bottom: 6px;
    text-transform: none;
  }

  /* ── ZONE 4 · WORKSPACE nav ── */
  .workspace { margin-top: 16px; }
  .nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nav-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 11px;
    height: 37px;
    padding: 0 10px;
    border-radius: 9px;
    cursor: pointer;
    color: var(--label-secondary);
    transition: background 0.14s ease, color 0.14s ease;
    user-select: none;
  }
  .nav-item .ico { flex: 0 0 19px; display: flex; color: var(--label-tertiary); transition: color 0.14s ease; }
  .nav-item .txt { font-size: 14px; font-weight: 450; letter-spacing: -0.006em; }
  .nav-item:hover { background: var(--accent-tint-hover); }
  /* Manager-style selection: soft full-width rounded-rect accent tint,
     icon + label in accent — given a faint inner glass sheen for the jewel feel */
  .nav-item.selected {
    background: var(--accent-tint);
    color: var(--accent);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.6),
      inset 0 0 0 0.5px rgba(80,55,195,0.10);
  }
  .nav-item.selected .ico { color: var(--accent); }
  .nav-item.selected .txt { font-weight: 590; }

  /* ── ZONE 5 · RECENTS peek ── */
  .recents { margin-top: 18px; }
  .recents .section-label { margin-bottom: 5px; }
  .recent-item {
    display: flex;
    align-items: center;
    gap: 11px;
    height: 33px;
    padding: 0 10px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.14s ease;
  }
  .recent-item:hover { background: var(--accent-tint-hover); }
  .recent-dot {
    width: 18px; height: 14px; border-radius: 4px;
    flex: 0 0 18px;
    box-shadow:
      inset 0 0 0 0.5px var(--hairline),
      inset 0 0.5px 0 rgba(255,255,255,0.5);
  }
  .recent-item .rtxt {
    font-size: 13px;
    font-weight: 440;
    color: var(--label-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .spacer { flex: 1 1 auto; min-height: 12px; }

  /* ── ZONE 6 · ACCOUNT dock / workspace switcher ── */
  .dock {
    position: relative;
    margin-top: 8px;
    padding-top: 11px;
  }
  .dock::before {
    content: "";
    position: absolute;
    top: 0; left: 6px; right: 6px;
    height: 1px;
    background: var(--hairline);
  }
  .dock::after {
    content: "";
    position: absolute;
    top: 1px; left: 6px; right: 6px;
    height: 0.5px;
    background: rgba(255,255,255,0.7);
  }
  .account {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 50px;
    padding: 0 8px;
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.14s ease;
  }
  .account:hover { background: var(--accent-tint-hover); }
  .avatar {
    width: 31px; height: 31px;
    flex: 0 0 31px;
    border-radius: 9px;
    background: linear-gradient(135deg, #5a4bbf, #3a2491);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 590; letter-spacing: 0.01em;
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.3), 0 1px 2px rgba(40,20,120,0.22);
  }
  .acct-text { flex: 1 1 auto; min-width: 0; line-height: 1.28; }
  .acct-name { font-size: 13px; font-weight: 590; color: var(--label-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .acct-org { font-size: 11.5px; font-weight: 440; color: var(--label-tertiary); }
  .chev { flex: 0 0 16px; color: var(--label-tertiary); }

  /* ============ CONTENT — floating frosted panel, faint slide cards ====== */
  .content {
    position: relative;
    flex: 1 1 auto;
    margin-left: 12px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.80);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    backdrop-filter: blur(22px) saturate(140%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.8),
      inset 0 0 0 0.5px rgba(255,255,255,0.55),
      inset 0 0 0 1px var(--hairline-faint);
    padding: 28px 34px;
    overflow: hidden;
  }
  .content-head { margin-bottom: 24px; }
  .content-title {
    font-size: 25px;
    font-weight: 680;
    letter-spacing: -0.024em;
    color: var(--label-primary);
  }
  .content-sub {
    font-size: 13.5px;
    font-weight: 440;
    color: var(--label-secondary);
    margin-top: 5px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .card {
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    background: #fff;
    box-shadow:
      0 0 0 0.5px var(--hairline),
      0 6px 16px -8px rgba(40, 30, 80, 0.16);
    padding: 14px 15px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    overflow: hidden;
  }
  .card .bar { height: 7px; border-radius: 3px; background: rgba(120,120,128,0.15); }
  .card .bar.title { height: 9px; width: 62%; background: rgba(80,55,195,0.22); }
  .card .bar.w80 { width: 80%; }
  .card .bar.w55 { width: 55%; }
  .card .bar.w70 { width: 70%; }
  .card .swatch { margin-top: auto; height: 36px; border-radius: 7px; }
  .card .sw1 { background: linear-gradient(135deg, #eef0ff, #e7ecff); }
  .card .sw2 { background: linear-gradient(135deg, #fdeef6, #f5edff); }
  .card .sw3 { background: linear-gradient(135deg, #eafaff, #eef3ff); }
  .card.ghost { opacity: 0.5; }

  /* new-card tile */
  .card.new {
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(120,120,128,0.045);
    box-shadow: inset 0 0 0 1px var(--hairline);
    color: var(--label-tertiary);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .card.new:hover { background: var(--accent-tint-hover); color: var(--accent); }
  .card.new .nlabel { font-size: 12.5px; font-weight: 500; }
</style>
</head>
<body>
  <div class="window">
    <div class="wallpaper">
      <div class="glow g1"></div>
      <div class="glow g2"></div>
      <div class="glow g3"></div>
    </div>

    <div class="traffic">
      <span class="c1"></span><span class="c2"></span><span class="c3"></span>
    </div>

    <div class="layout">
      <!-- ============ RAIL — the jewel ============ -->
      <aside class="rail">

        <!-- ZONE 1 · BRAND -->
        <div class="brand">
          <div class="logo-tile">
            <svg width="16" height="16" viewBox="0 0 1024 1024" fill="none"><path d="M550.92 757.41C541.61 760.4 532.75 763.28 524.24 766.08C523.99 766.17 523.89 766.47 524.03 766.69L576.88 846.16C576.95 846.27 577.08 846.33 577.21 846.33L810.96 846.34C811.27 846.34 811.46 846 811.3 845.73L708.23 673.58C708.12 673.38 707.86 673.32 707.67 673.45C667.43 700.83 625.34 728.47 553.87 756.35L550.92 757.41Z" fill="white"/><path d="M193.26 819.15C193.26 819.15 201.93 654.66 270.55 535.82C339.17 416.98 470.33 323.67 653.06 275.7C653.06 275.7 798.18 240.63 843.13 213.39C843.13 213.39 892.02 180.38 869.94 257.13C869.94 257.13 840.65 331.44 750.35 379.68C729.06 390.83 713.24 393.32 716.58 414.53C722.62 436.09 757.15 419.7 761.89 417.23C770.1 410.15 850.14 387.29 796.81 466.97C743.18 549.5 710.63 624.37 502.42 698.64C363.61 738.25 308.4 760.54 227.96 836.47C187.73 866.24 193.26 819.15 193.26 819.15Z" fill="white"/><path d="M322.48 117.38C329.53 236.44 348.73 261.33 462.1 298.36C343.04 305.41 318.16 324.61 281.12 437.98C274.07 318.92 254.88 294.03 141.5 257C260.56 249.95 285.45 230.75 322.48 117.38Z" fill="white"/></svg>
          </div>
          <span class="brand-name">Foxit Slides</span>
        </div>

        <div class="zone-rule"></div>

        <!-- ZONE 2 · PRIMARY ACTION -->
        <button class="new-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>New Presentation</span>
        </button>

        <!-- ZONE 3 · SEARCH -->
        <div class="search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input type="text" placeholder="Search presentations" />
        </div>

        <div class="zone-rule"></div>

        <!-- ZONE 4 · WORKSPACE -->
        <div class="workspace">
          <div class="section-label">Workspace</div>
          <nav class="nav">
            <div class="nav-item selected">
              <span class="ico">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-5h5v5"/></svg>
              </span>
              <span class="txt">Home</span>
            </div>
            <div class="nav-item">
              <span class="ico">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="12" rx="2"/><path d="M9 20h6M12 16.5V20"/></svg>
              </span>
              <span class="txt">Studio</span>
            </div>
          </nav>
        </div>

        <!-- ZONE 5 · RECENTS -->
        <div class="recents">
          <div class="section-label">Recents</div>
          <div class="recent-item">
            <span class="recent-dot" style="background:linear-gradient(135deg,#eef0ff,#e7ecff)"></span>
            <span class="rtxt">Q3 Board Review</span>
          </div>
          <div class="recent-item">
            <span class="recent-dot" style="background:linear-gradient(135deg,#fdeef6,#f5edff)"></span>
            <span class="rtxt">Product Launch Deck</span>
          </div>
          <div class="recent-item">
            <span class="recent-dot" style="background:linear-gradient(135deg,#eafaff,#eef3ff)"></span>
            <span class="rtxt">Onboarding Walkthrough</span>
          </div>
        </div>

        <div class="spacer"></div>

        <!-- ZONE 6 · ACCOUNT -->
        <div class="dock">
          <div class="account">
            <div class="avatar">LC</div>
            <div class="acct-text">
              <div class="acct-name">Lisa Caudillo</div>
              <div class="acct-org">Foxit</div>
            </div>
            <span class="chev">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m8 9 4-4 4 4"/><path d="m8 15 4 4 4-4"/></svg>
            </span>
          </div>
        </div>
      </aside>

      <!-- ============ CONTENT ============ -->
      <main class="content">
        <div class="content-head">
          <div class="content-title">Good afternoon, Lisa</div>
          <div class="content-sub">Pick up where you left off, or start something new.</div>
        </div>
        <div class="grid">
          <div class="card new">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span class="nlabel">New Presentation</span>
          </div>
          <div class="card">
            <div class="bar title"></div>
            <div class="bar w80"></div>
            <div class="bar w55"></div>
            <div class="swatch sw1"></div>
          </div>
          <div class="card">
            <div class="bar title"></div>
            <div class="bar w70"></div>
            <div class="bar w55"></div>
            <div class="swatch sw2"></div>
          </div>
          <div class="card ghost">
            <div class="bar title"></div>
            <div class="bar w80"></div>
            <div class="bar w70"></div>
