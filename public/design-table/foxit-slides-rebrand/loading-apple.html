<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foxit Slides — Generating, the Apple way</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --grad:linear-gradient(135deg,#4776E6,#6D28D9,#A855F7); }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:opacity .3s ease!important}}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    /* calm field — a soft tint, never a saturated takeover */
    background:radial-gradient(900px 700px at 50% 42%,#fbfaff 0%,#f5f2fb 58%,#f1eef9 100%)}

  .stage{display:flex;flex-direction:column;align-items:center;text-align:center}

  /* the one living element — soft iridescent glow that breathes */
  .orb{position:relative;width:132px;height:132px;display:flex;align-items:center;justify-content:center}
  .halo{position:absolute;inset:-70px;border-radius:50%;
    background:radial-gradient(circle,rgba(124,80,230,.30),rgba(168,85,247,.14) 45%,transparent 70%);
    filter:blur(14px);animation:breatheHalo 4.2s ease-in-out infinite}
  .disc{position:relative;width:108px;height:108px;border-radius:50%;
    background:var(--grad);
    box-shadow:0 12px 40px rgba(124,80,230,.42),inset 0 1px 0 rgba(255,255,255,.4);
    animation:breathe 4.2s ease-in-out infinite;overflow:hidden}
  /* slow iridescent shimmer sweep across the disc */
  .disc::before{content:'';position:absolute;inset:-30%;
    background:conic-gradient(from 0deg,transparent 0deg,rgba(255,255,255,.55) 40deg,transparent 90deg,transparent 360deg);
    animation:spin 6s linear infinite;mix-blend-mode:screen}
  .disc::after{content:'';position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 32% 28%,rgba(255,255,255,.5),transparent 46%)}
  .disc svg{position:relative;z-index:2;opacity:.95}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  @keyframes breatheHalo{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .deck{margin-top:34px;font-size:13px;font-weight:500;color:#94a3b8;letter-spacing:.01em}
  /* one quiet line that changes slowly */
  .line{margin-top:8px;font-size:18px;font-weight:600;letter-spacing:-.01em;color:#1d1d1f;
    transition:opacity .5s ease;min-height:24px}
</style>
</head>
<body>
  <div class="stage">
    <div class="orb">
      <div class="halo"></div>
      <div class="disc">
        <svg width="46" height="46" viewBox="0 0 1024 1024" fill="none"><path d="M550.92 757.41C541.61 760.4 532.75 763.28 524.24 766.08C523.99 766.17 523.89 766.47 524.03 766.69L576.88 846.16C576.95 846.27 577.08 846.33 577.21 846.33L810.96 846.34C811.27 846.34 811.46 846 811.3 845.73L708.23 673.58C708.12 673.38 707.86 673.32 707.67 673.45C667.43 700.83 625.34 728.47 553.87 756.35L550.92 757.41Z" fill="white"/><path d="M193.26 819.15C193.26 819.15 201.93 654.66 270.55 535.82C339.17 416.98 470.33 323.67 653.06 275.7C653.06 275.7 798.18 240.63 843.13 213.39C843.13 213.39 892.02 180.38 869.94 257.13C869.94 257.13 840.65 331.44 750.35 379.68C729.06 390.83 713.24 393.32 716.58 414.53C722.62 436.09 757.15 419.7 761.89 417.23C770.1 410.15 850.14 387.29 796.81 466.97C743.18 549.5 710.63 624.37 502.42 698.64C363.61 738.25 308.4 760.54 227.96 836.47C187.73 866.24 193.26 819.15 193.26 819.15Z" fill="white"/><path d="M322.48 117.38C329.53 236.44 348.73 261.33 462.1 298.36C343.04 305.41 318.16 324.61 281.12 437.98C274.07 318.92 254.88 294.03 141.5 257C260.56 249.95 285.45 230.75 322.48 117.38Z" fill="white"/></svg>
      </div>
    </div>
    <div class="deck">Q3 Board Review</div>
    <div class="line" id="line">Creating your presentation</div>
  </div>

<script>
  // one quiet line, changing slowly — calm, never a status feed
  const lines = [
    "Creating your presentation",
    "Designing your slides",
    "Almost ready"
  ];
  const el = document.getElementById('line');
  let i = 0;
  setInterval(() => {
    el.style.opacity = 0;
    setTimeout(() => { i = (i + 1) % lines.length; el.textContent = lines[i]; el.style.opacity = 1; }, 500);
  }, 3600);
</script>
</body>
</html>
