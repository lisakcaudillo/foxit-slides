<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foxit Slides — Apple Nav (D2 / Clarity & Structure)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;590;680&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Apple label colors */
    --label-primary: #1d1d1f;
    --label-secondary: #6e6e73;
    --label-tertiary: #8e8e93;
    --label-quaternary: #b0b0b6;

    /* single restrained accent */
    --accent: #5037C3;
    --accent-tint: rgba(80, 55, 195, 0.10);
    --accent-tint-hover: rgba(80, 55, 195, 0.06);

    /* hairline depth */
    --hairline: rgba(0, 0, 0, 0.07);
    --hairline-soft: rgba(0, 0, 0, 0.045);

    /* type */
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;

    /* 8pt rhythm */
    --r1: 8px; --r2: 16px; --r3: 24px; --r4: 32px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: #d9d4e6;
    color: var(--label-primary);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  /* ============ App window ============ */
  .window {
    position: relative;
    width: 1120px;
    height: 720px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.04),
      0 24px 60px -12px rgba(40, 30, 80, 0.42),
      0 2px 8px rgba(0,0,0,0.10);
    isolation: isolate;
  }

  /* colorful wallpaper so the frosted rail picks up color */
  .wallpaper {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, #f3ecff 0%, #e7eeff 38%, #ffeef6 72%, #eef6ff 100%);
    z-index: 0;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(58px);
    opacity: 0.55;
  }
  .blob.b1 { width: 360px; height: 360px; left: -60px; top: 120px;
    background: radial-gradient(circle at 30% 30%, #A855F7, transparent 70%); opacity: 0.42; }
  .blob.b2 { width: 420px; height: 420px; right: -80px; top: -90px;
    background: radial-gradient(circle at 50% 50%, #4776E6, transparent 70%); opacity: 0.34; }
  .blob.b3 { width: 320px; height: 320px; right: 220px; bottom: -120px;
    background: radial-gradient(circle at 50% 50%, #ff9ec4, transparent 70%); opacity: 0.30; }
  .blob.b4 { width: 260px; height: 260px; left: 360px; top: -60px;
    background: radial-gradient(circle at 50% 50%, #7fd7ff, transparent 70%); opacity: 0.26; }

  /* traffic-light window controls */
  .traffic {
    position: absolute;
    top: 18px; left: 20px;
    display: flex; gap: 8px;
    z-index: 5;
  }
  .traffic span { width: 12px; height: 12px; border-radius: 50%; display: block;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }
  .traffic .c1 { background: #ff5f57; }
  .traffic .c2 { background: #febc2e; }
  .traffic .c3 { background: #28c840; }

  /* layout: inset/floating sidebar + floating content */
  .layout {
    position: absolute;
    inset: 0;
    display: flex;
    gap: 0;
    padding: 12px;
    padding-top: 44px;        /* clear the traffic lights */
    z-index: 2;
  }

  /* ============ The rail — translucent vibrancy material, floating/inset ============ */
  .rail {
    position: relative;
    width: 244px;
    flex: 0 0 244px;
    border-radius: 14px;
    background: rgba(252, 251, 255, 0.62);
    -webkit-backdrop-filter: blur(34px) saturate(180%);
    backdrop-filter: blur(34px) saturate(180%);
    box-shadow:
      inset 0 0 0 0.5px rgba(255,255,255,0.55),
      inset 0 0 0 1px var(--hairline-soft);
    display: flex;
    flex-direction: column;
    padding: 14px 12px 12px;
    overflow: hidden;
  }

  /* brand row */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 6px 2px;
    margin-bottom: 14px;
  }
  .logo-tile {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, #4776E6, #A855F7);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 2px rgba(70, 40, 160, 0.30), inset 0 0.5px 0 rgba(255,255,255,0.4);
    flex: 0 0 30px;
  }
  .brand-name {
    font-size: 15px;
    font-weight: 590;
    letter-spacing: -0.012em;
    color: var(--label-primary);
  }

  /* primary action — Liquid Glass capsule */
  .new-btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    height: 38px;
    padding: 0 12px;
    margin-bottom: 18px;
    border: none;
    border-radius: 11px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 530;
    letter-spacing: -0.006em;
    color: var(--accent);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.18)),
      rgba(80, 55, 195, 0.07);
    -webkit-backdrop-filter: blur(12px) saturate(150%);
    backdrop-filter: blur(12px) saturate(150%);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.85),
      inset 0 0 0 0.5px rgba(80,55,195,0.16),
      0 1px 2px rgba(50, 30, 120, 0.10);
    transition: transform 0.18s cubic-bezier(0.2,0.7,0.3,1), box-shadow 0.18s ease, background 0.18s ease;
  }
  .new-btn::after {
    /* specular edge highlight */
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 11px;
    background: linear-gradient(120deg, rgba(255,255,255,0.5) 0%, transparent 30%, transparent 70%, rgba(255,255,255,0.22) 100%);
    pointer-events: none;
    mix-blend-mode: screen;
  }
  .new-btn:hover {
    transform: translateY(-0.5px);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.22)),
      rgba(80, 55, 195, 0.10);
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.9),
      inset 0 0 0 0.5px rgba(80,55,195,0.24),
      0 2px 6px rgba(50, 30, 120, 0.16);
  }
  .new-btn:active { transform: translateY(0); }
  .new-btn svg { flex: 0 0 17px; }

  /* search — quiet, deferential */
  .search {
    position: relative;
    margin-bottom: 16px;
  }
  .search input {
    width: 100%;
    height: 30px;
    padding: 0 10px 0 30px;
    border: none;
    border-radius: 9px;
    font-family: inherit;
    font-size: 13px;
    color: var(--label-primary);
    background: rgba(120, 120, 128, 0.10);
    box-shadow: inset 0 0 0 0.5px var(--hairline-soft);
    outline: none;
    transition: background 0.15s ease, box-shadow 0.15s ease;
  }
  .search input::placeholder { color: var(--label-tertiary); }
  .search input:focus {
    background: rgba(255,255,255,0.7);
    box-shadow: inset 0 0 0 0.5px var(--hairline), 0 0 0 3px rgba(80,55,195,0.12);
  }
  .search svg {
    position: absolute;
    left: 9px; top: 50%;
    transform: translateY(-50%);
    color: var(--label-tertiary);
    pointer-events: none;
  }

  /* section label */
  .section-label {
    font-size: 11px;
    font-weight: 590;
    letter-spacing: 0.01em;
    color: var(--label-tertiary);
    padding: 0 8px;
    margin-bottom: 6px;
  }

  /* nav list */
  .nav {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    height: 36px;
    padding: 0 10px;
    border-radius: 9px;
    cursor: pointer;
    color: var(--label-secondary);
    transition: background 0.14s ease, color 0.14s ease;
    user-select: none;
  }
  .nav-item .ico { flex: 0 0 19px; display: flex; color: var(--label-tertiary); transition: color 0.14s ease; }
  .nav-item .txt { font-size: 14px; font-weight: 450; letter-spacing: -0.006em; }
  .nav-item:hover { background: var(--accent-tint-hover); }
  .nav-item.selected {
    background: var(--accent-tint);
    color: var(--accent);
  }
  .nav-item.selected .ico { color: var(--accent); }
  .nav-item.selected .txt { font-weight: 530; }

  /* Recents peek — quiet, deferential */
  .recents {
    margin-top: 18px;
  }
  .recents .section-label { margin-bottom: 4px; }
  .recent-item {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 32px;
    padding: 0 10px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.14s ease;
  }
  .recent-item:hover { background: var(--accent-tint-hover); }
  .recent-dot {
    width: 18px; height: 14px; border-radius: 3px;
    flex: 0 0 18px;
    box-shadow: inset 0 0 0 0.5px var(--hairline);
  }
  .recent-item .rtxt {
    font-size: 13px;
    font-weight: 440;
    color: var(--label-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .spacer { flex: 1 1 auto; min-height: 12px; }

  /* account dock — reads like a macOS workspace switcher */
  .dock {
    position: relative;
    margin-top: 8px;
    padding-top: 10px;
  }
  .dock::before {
    content: "";
    position: absolute;
    top: 0; left: 6px; right: 6px;
    height: 0.5px;
    background: var(--hairline);
  }
  .account {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 48px;
    padding: 0 8px;
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.14s ease;
  }
  .account:hover { background: var(--accent-tint-hover); }
  .avatar {
    width: 30px; height: 30px;
    flex: 0 0 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6e6e73, #3a3a3c);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 590; letter-spacing: 0.01em;
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.25);
  }
  .acct-text { flex: 1 1 auto; min-width: 0; line-height: 1.25; }
  .acct-name { font-size: 13px; font-weight: 530; color: var(--label-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .acct-org { font-size: 11.5px; font-weight: 440; color: var(--label-tertiary); }
  .chev { flex: 0 0 16px; color: var(--label-tertiary); }

  /* ============ Content area — floating, faint slide cards ============ */
  .content {
    position: relative;
    flex: 1 1 auto;
    margin-left: 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.78);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    backdrop-filter: blur(20px) saturate(140%);
    box-shadow:
      inset 0 0 0 0.5px rgba(255,255,255,0.6),
      inset 0 0 0 1px var(--hairline-soft);
    padding: 26px 32px;
    overflow: hidden;
  }
  .content-head { margin-bottom: 22px; }
  .content-title {
    font-size: 24px;
    font-weight: 680;
    letter-spacing: -0.022em;
    color: var(--label-primary);
  }
  .content-sub {
    font-size: 13.5px;
    font-weight: 440;
    color: var(--label-secondary);
    margin-top: 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .card {
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    background: #fff;
    box-shadow:
      0 0 0 0.5px var(--hairline),
      0 6px 16px -8px rgba(40, 30, 80, 0.18);
    padding: 14px 15px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    overflow: hidden;
  }
  .card .bar { height: 7px; border-radius: 3px; background: rgba(120,120,128,0.16); }
  .card .bar.title { height: 9px; width: 62%; background: rgba(80,55,195,0.22); }
  .card .bar.w80 { width: 80%; }
  .card .bar.w55 { width: 55%; }
  .card .bar.w70 { width: 70%; }
  .card .swatch { margin-top: auto; height: 34px; border-radius: 7px; }
  .card .sw1 { background: linear-gradient(135deg, #eef0ff, #e7ecff); }
  .card .sw2 { background: linear-gradient(135deg, #fdeef6, #f5edff); }
  .card .sw3 { background: linear-gradient(135deg, #eafaff, #eef3ff); }
  .card.ghost { opacity: 0.5; }

  /* new-card tile */
  .card.new {
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(120,120,128,0.05);
    box-shadow: inset 0 0 0 1px var(--hairline);
    color: var(--label-tertiary);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .card.new:hover { background: var(--accent-tint-hover); color: var(--accent); }
  .card.new .nlabel { font-size: 12.5px; font-weight: 500; }
</style>
</head>
<body>
  <div class="window">
    <div class="wallpaper">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="blob b4"></div>
    </div>

    <div class="traffic">
      <span class="c1"></span><span class="c2"></span><span class="c3"></span>
    </div>

    <div class="layout">
      <!-- ============ RAIL ============ -->
      <aside class="rail">
        <div class="brand">
          <div class="logo-tile">
            <svg width="16" height="16" viewBox="0 0 1024 1024" fill="none"><path d="M550.92 757.41C541.61 760.4 532.75 763.28 524.24 766.08C523.99 766.17 523.89 766.47 524.03 766.69L576.88 846.16C576.95 846.27 577.08 846.33 577.21 846.33L810.96 846.34C811.27 846.34 811.46 846 811.3 845.73L708.23 673.58C708.12 673.38 707.86 673.32 707.67 673.45C667.43 700.83 625.34 728.47 553.87 756.35L550.92 757.41Z" fill="white"/><path d="M193.26 819.15C193.26 819.15 201.93 654.66 270.55 535.82C339.17 416.98 470.33 323.67 653.06 275.7C653.06 275.7 798.18 240.63 843.13 213.39C843.13 213.39 892.02 180.38 869.94 257.13C869.94 257.13 840.65 331.44 750.35 379.68C729.06 390.83 713.24 393.32 716.58 414.53C722.62 436.09 757.15 419.7 761.89 417.23C770.1 410.15 850.14 387.29 796.81 466.97C743.18 549.5 710.63 624.37 502.42 698.64C363.61 738.25 308.4 760.54 227.96 836.47C187.73 866.24 193.26 819.15 193.26 819.15Z" fill="white"/><path d="M322.48 117.38C329.53 236.44 348.73 261.33 462.1 298.36C343.04 305.41 318.16 324.61 281.12 437.98C274.07 318.92 254.88 294.03 141.5 257C260.56 249.95 285.45 230.75 322.48 117.38Z" fill="white"/></svg>
          </div>
          <span class="brand-name">Foxit Slides</span>
        </div>

        <!-- primary action: Liquid Glass capsule -->
        <button class="new-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>New Presentation</span>
        </button>

        <!-- quiet search -->
        <div class="search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input type="text" placeholder="Search" />
        </div>

        <!-- Workspace section -->
        <div class="section-label">Workspace</div>
        <nav class="nav">
          <div class="nav-item selected">
            <span class="ico">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-5h5v5"/></svg>
            </span>
            <span class="txt">Home</span>
          </div>
          <div class="nav-item">
            <span class="ico">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="12" rx="2"/><path d="M9 20h6M12 16.5V20"/></svg>
            </span>
            <span class="txt">Studio</span>
          </div>
        </nav>

        <!-- Recents peek -->
        <div class="recents">
          <div class="section-label">Recents</div>
          <div class="recent-item">
            <span class="recent-dot" style="background:linear-gradient(135deg,#eef0ff,#e7ecff)"></span>
            <span class="rtxt">Q3 Board Review</span>
          </div>
          <div class="recent-item">
            <span class="recent-dot" style="background:linear-gradient(135deg,#fdeef6,#f5edff)"></span>
            <span class="rtxt">Product Launch Deck</span>
          </div>
          <div class="recent-item">
            <span class="recent-dot" style="background:linear-gradient(135deg,#eafaff,#eef3ff)"></span>
            <span class="rtxt">Onboarding Walkthrough</span>
          </div>
        </div>

        <div class="spacer"></div>

        <!-- account dock / workspace switcher -->
        <div class="dock">
          <div class="account">
            <div class="avatar">LC</div>
            <div class="acct-text">
              <div class="acct-name">Lisa Caudillo</div>
              <div class="acct-org">Foxit</div>
            </div>
            <span class="chev">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m8 9 4-4 4 4"/><path d="m8 15 4 4 4-4"/></svg>
            </span>
          </div>
        </div>
      </aside>

      <!-- ============ CONTENT ============ -->
      <main class="content">
        <div class="content-head">
          <div class="content-title">Good afternoon, Lisa</div>
          <div class="content-sub">Pick up where you left off, or start something new.</div>
        </div>
        <div class="grid">
          <div class="card new">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span class="nlabel">New Presentation</span>
          </div>
          <div class="card">
            <div class="bar title"></div>
            <div class="bar w80"></div>
            <div class="bar w55"></div>
            <div class="swatch sw1"></div>
          </div>
          <div class="card">
            <div class="bar title"></div>
            <div class="bar w70"></div>
            <div class="bar w55"></div>
            <div class="swatch sw2"></div>
          </div>
          <div class="card ghost">
            <div class="bar title"></div>
            <div class="bar w80"></div>
            <div class="bar w70"></div>
            <div class="swatch sw3"></div>
          </div>
          <div class="card ghost">
            <div class="bar title"></div>
            <div class="bar w55"></div>
            <div class="bar w70"></div>
            <div class="swatch sw1"></div>
          </div>
          <div class="card ghost">
            <div class="bar title"></div>
            <div class="bar w70"></div>
            <div class="bar w80"></div>
            <div class="swatch sw2"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
