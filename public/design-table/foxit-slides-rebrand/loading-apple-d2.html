<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foxit Slides — Creating your presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --grad: linear-gradient(135deg, #4776E6, #6D28D9, #A855F7);
    --ink: #1d1d1f;
    --muted: #86868b;
    --line: #e6e7ec;
    --frame: rgba(255, 255, 255, 0.9);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink);
    /* Calm light field — soft tint, not a takeover */
    background:
      radial-gradient(120% 90% at 50% 0%, #fbfbfd 0%, #f6f5fb 55%, #f1f0f9 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    width: min(92vw, 720px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  /* ── The single materializing slide ─────────────────────── */
  .slide {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--frame);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-shadow:
      0 1px 1px rgba(20, 20, 40, 0.03),
      0 18px 50px -24px rgba(60, 50, 120, 0.18),
      0 40px 90px -50px rgba(60, 50, 120, 0.16);
    overflow: hidden;
    /* the whole frame breathes very gently — alive, never busy */
    animation: frameBreathe 7s ease-in-out infinite;
  }

  /* a slow brand sheen drifts across the surface as it "draws itself" */
  .slide::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 38%,
      rgba(140, 110, 235, 0.07) 50%,
      transparent 62%
    );
    transform: translateX(-120%);
    animation: sheen 6.5s ease-in-out infinite;
    pointer-events: none;
  }

  .canvas {
    position: absolute;
    inset: 0;
    padding: 11% 9%;
    display: flex;
    flex-direction: column;
    gap: 5.5%;
  }

  /* placeholder elements — shimmer into being one after another */
  .ph {
    position: relative;
    border-radius: 7px;
    background: #eceaf4;
    opacity: 0;
    transform: translateY(7px);
    overflow: hidden;
    animation: settle 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  /* each placeholder carries a soft travelling gradient shimmer */
  .ph::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.65) 45%,
      transparent 90%
    );
    transform: translateX(-100%);
    animation: shimmer 2.8s ease-in-out infinite;
  }

  /* accent bar gets the brand gradient, calmly */
  .ph.accent { background: var(--grad); }
  .ph.accent::before { animation: shimmer 3.4s ease-in-out infinite; }

  .title    { height: 13%; width: 56%; }
  .rule     { height: 4%;  width: 22%; border-radius: 4px; }
  .body     { height: 8%; }
  .body.a   { width: 92%; }
  .body.b   { width: 84%; }
  .body.c   { width: 67%; }

  /* a small media block hints at structure without a placeholder "image box" feel */
  .row { display: flex; gap: 5%; margin-top: auto; align-items: flex-end; }
  .col { display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .chip { height: 10px; border-radius: 5px; }
  .chip.short { width: 60%; }

  /* staggered entrances — the slide assembles in reading order */
  .d1 { animation-delay: 0.25s; }
  .d2 { animation-delay: 0.55s; }
  .d3 { animation-delay: 0.95s; }
  .d4 { animation-delay: 1.20s; }
  .d5 { animation-delay: 1.45s; }
  .d6 { animation-delay: 1.85s; }
  .d7 { animation-delay: 2.10s; }
  .d8 { animation-delay: 2.35s; }

  /* ── Quiet caption row ──────────────────────────────────── */
  .caption {
    display: flex;
    align-items: center;
    gap: 11px;
    height: 22px;
  }

  .mark {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--grad);
    display: flex;
    align-items: center;
    justify-content: center;
    flex: none;
    opacity: 0.92;
  }
  .mark svg { width: 12px; height: 12px; }

  .line {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.1px;
    color: var(--muted);
  }
  .line span {
    display: inline-block;
    animation: lineFade 12s ease-in-out infinite;
  }

  /* a single thin breathing dot, no bar */
  .pulse {
    width: 5px; height: 5px; border-radius: 50%;
    background: #b9a6ee;
    animation: dotPulse 1.9s ease-in-out infinite;
  }

  /* ── Keyframes ──────────────────────────────────────────── */
  @keyframes settle {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    55%  { transform: translateX(120%); }
    100% { transform: translateX(120%); }
  }
  @keyframes sheen {
    0%   { transform: translateX(-120%); }
    60%  { transform: translateX(120%); }
    100% { transform: translateX(120%); }
  }
  @keyframes frameBreathe {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-3px) scale(1.004); }
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.35; transform: scale(0.85); }
    50%      { opacity: 1;    transform: scale(1.15); }
  }
  @keyframes lineFade {
    0%, 26%   { opacity: 1; }
    33%, 59%  { opacity: 1; }
    66%, 92%  { opacity: 1; }
    /* handled by JS swap; keep subtle idle */
  }

  /* ── Reduced motion ─────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .slide,
    .slide::after,
    .ph,
    .ph::before,
    .pulse,
    .line span { animation: none !important; }
    .ph { opacity: 1; transform: none; }
    .mark { opacity: 0.92; }
  }
</style>
</head>
<body>
  <main class="stage" aria-label="Creating your presentation">

    <!-- ONE calm slide, drawing itself into being where it will live -->
    <section class="slide" role="img" aria-label="Your presentation is taking shape">
      <div class="canvas">
        <div class="ph accent rule d1"></div>
        <div class="ph title d2"></div>
        <div class="ph body a d3"></div>
        <div class="ph body b d4"></div>
        <div class="ph body c d5"></div>
        <div class="row">
          <div class="col">
            <div class="ph chip d6"></div>
            <div class="ph chip short d6"></div>
          </div>
          <div class="col">
            <div class="ph chip d7"></div>
            <div class="ph chip short d7"></div>
          </div>
          <div class="col">
            <div class="ph chip d8"></div>
            <div class="ph chip short d8"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Quiet caption: tiny peripheral mark + one slowly changing line -->
    <div class="caption">
      <span class="mark" aria-hidden="true">
        <svg viewBox="0 0 1024 1024" fill="none">
          <path d="M550.92 757.41C541.61 760.4 532.75 763.28 524.24 766.08C523.99 766.17 523.89 766.47 524.03 766.69L576.88 846.16C576.95 846.27 577.08 846.33 577.21 846.33L810.96 846.34C811.27 846.34 811.46 846 811.3 845.73L708.23 673.58C708.12 673.38 707.86 673.32 707.67 673.45C667.43 700.83 625.34 728.47 553.87 756.35L550.92 757.41Z" fill="white"/>
          <path d="M193.26 819.15C193.26 819.15 201.93 654.66 270.55 535.82C339.17 416.98 470.33 323.67 653.06 275.7C653.06 275.7 798.18 240.63 843.13 213.39C843.13 213.39 892.02 180.38 869.94 257.13C869.94 257.13 840.65 331.44 750.35 379.68C729.06 390.83 713.24 393.32 716.58 414.53C722.62 436.09 757.15 419.7 761.89 417.23C770.1 410.15 850.14 387.29 796.81 466.97C743.18 549.5 710.63 624.37 502.42 698.64C363.61 738.25 308.4 760.54 227.96 836.47C187.73 866.24 193.26 819.15 193.26 819.15Z" fill="white"/>
          <path d="M322.48 117.38C329.53 236.44 348.73 261.33 462.1 298.36C343.04 305.41 318.16 324.61 281.12 437.98C274.07 318.92 254.88 294.03 141.5 257C260.56 249.95 285.45 230.75 322.48 117.38Z" fill="white"/>
        </svg>
      </span>
      <span class="line"><span id="phrase">Creating your presentation</span></span>
      <span class="pulse" aria-hidden="true"></span>
    </div>
  </main>

  <script>
    // One slowly-changing generic line. No deck name, ever.
    (function () {
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) return;
      var phrases = [
        'Creating your presentation',
        'Designing your slides',
        'Shaping the layout',
        'Almost ready'
      ];
      var el = document.getElementById('phrase');
      var i = 0;
      setInterval(function () {
        el.style.transition = 'opacity 0.5s ease';
        el.style.opacity = '0';
        setTimeout(function () {
          i = (i + 1) % phrases.length;
          el.textContent = phrases[i];
          el.style.opacity = '1';
        }, 500);
      }, 3200);
    })();
  </script>
</body>
</html>
