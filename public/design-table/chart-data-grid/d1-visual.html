<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chart Data-Table Editor — D1 Visual Craft</title>
<style>
  :root{
    --slate-900:#0f172a; --slate-800:#1e293b; --slate-700:#334155;
    --slate-600:#475569; --slate-500:#64748b; --slate-400:#94a3b8;
    --slate-300:#cbd5e1; --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
    --violet-600:#7c3aed; --violet-500:#8b5cf6; --violet-100:#ede9fe; --violet-50:#f5f3ff;
    --foxit:#FF5F00;
    --s1:#7c3aed; /* series 2025 — violet */
    --s2:#60a5fa; /* series 2026 — AI blue */
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(180deg,#f9f6ff 0%,#f4f0ff 40%,#eef3ff 100%);
    color:var(--slate-900); -webkit-font-smoothing:antialiased;
    display:flex; align-items:stretch; min-height:100vh;
  }

  /* ───────── Slide canvas sliver (context) ───────── */
  .stage{flex:1; display:flex; align-items:center; justify-content:center; padding:48px 40px;}
  .slide{
    width:100%; max-width:680px; aspect-ratio:16/9;
    background:#ffffff; border-radius:18px;
    box-shadow:0 1px 3px rgba(15,23,42,.05),0 30px 70px rgba(99,102,241,.12);
    border:1px solid rgba(15,23,42,.05);
    padding:44px 52px; position:relative; overflow:hidden;
  }
  .slide-kicker{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--violet-600);}
  .slide-title{font-size:30px;font-weight:700;line-height:1.15;margin-top:10px;color:var(--slate-900);letter-spacing:-.02em;}
  .slide-chart-frame{
    margin-top:26px; height:60%; border-radius:14px;
    background:linear-gradient(180deg,#fdfcff,#f7f5ff);
    border:1.5px solid var(--violet-600); outline:3px solid rgba(124,58,237,.12);
    padding:18px 22px; position:relative;
  }
  .selected-tag{
    position:absolute; top:-11px; left:18px; background:var(--violet-600); color:#fff;
    font-size:11px; font-weight:600; letter-spacing:.04em; padding:3px 9px; border-radius:7px;
    display:flex; align-items:center; gap:5px;
  }

  /* ───────── Inspector ───────── */
  .inspector{
    width:344px; flex:none; background:rgba(255,255,255,.82);
    backdrop-filter:blur(16px) saturate(1.05); -webkit-backdrop-filter:blur(16px) saturate(1.05);
    border-left:1px solid rgba(15,23,42,.07);
    box-shadow:-1px 0 0 rgba(255,255,255,.6),-24px 0 60px rgba(99,102,241,.06);
    display:flex; flex-direction:column; height:100vh; overflow-y:auto;
  }
  .insp-head{
    padding:20px 22px 16px; border-bottom:1px solid rgba(15,23,42,.06);
    position:sticky; top:0; background:rgba(255,255,255,.86);
    backdrop-filter:blur(12px); z-index:5;
  }
  .insp-eyebrow{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--violet-600);}
  .insp-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--violet-600);box-shadow:0 0 0 3px rgba(124,58,237,.16);}
  .insp-title{font-size:19px; font-weight:700; color:var(--slate-900); margin-top:8px; letter-spacing:-.01em;}
  .insp-sub{font-size:13px; color:var(--slate-500); margin-top:3px;}

  .section{padding:18px 22px;}
  .section + .section{border-top:1px solid rgba(15,23,42,.05);}
  .sec-label{
    font-size:12px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
    color:var(--slate-400); margin-bottom:13px; display:flex; align-items:center; justify-content:space-between;
  }

  /* ───────── Live preview card ───────── */
  .preview-card{
    background:#ffffff; border:1px solid rgba(15,23,42,.07); border-radius:14px;
    box-shadow:0 1px 3px rgba(15,23,42,.04),0 8px 24px rgba(99,102,241,.07);
    padding:16px 16px 12px; overflow:hidden;
  }
  .pv-title{font-size:15px; font-weight:600; color:var(--slate-800); margin-bottom:2px;}
  .pv-legend{display:flex; gap:14px; margin:8px 0 4px;}
  .pv-leg{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--slate-600); font-weight:500;}
  .pv-leg i{width:11px; height:11px; border-radius:3px; display:inline-block;}

  /* ───────── Data grid ───────── */
  .grid-wrap{
    border:1px solid rgba(15,23,42,.08); border-radius:14px; overflow:hidden;
    background:#ffffff; box-shadow:0 1px 2px rgba(15,23,42,.03);
  }
  table.grid{border-collapse:separate; border-spacing:0; width:100%; font-size:14px;}
  .grid th,.grid td{padding:0; position:relative;}
  .corner{
    width:46px; background:linear-gradient(180deg,#faf9ff,#f4f1fb);
    border-bottom:1px solid rgba(15,23,42,.07); border-right:1px solid rgba(15,23,42,.06);
  }
  .col-head{
    background:linear-gradient(180deg,#faf9ff,#f4f1fb);
    border-bottom:1px solid rgba(15,23,42,.07);
  }
  .col-head:not(:last-child){border-right:1px solid rgba(15,23,42,.05);}
  .col-head input{
    width:100%; border:none; background:transparent; text-align:center;
    font:inherit; font-weight:600; color:var(--slate-700); padding:11px 6px;
    outline:none; letter-spacing:-.005em;
  }
  .col-dot{display:flex; align-items:center; justify-content:center; gap:6px; padding-top:8px; margin-bottom:-3px;}
  .col-dot i{width:9px; height:9px; border-radius:3px;}

  .row-head{
    background:linear-gradient(90deg,#faf9ff,#f6f4fc);
    border-right:1px solid rgba(15,23,42,.07);
    border-top:1px solid rgba(15,23,42,.05);
  }
  .row-head input{
    width:100%; border:none; background:transparent; font:inherit; font-weight:600;
    color:var(--slate-700); padding:12px 14px; outline:none;
  }
  td.cell{border-top:1px solid rgba(15,23,42,.05); border-right:1px solid rgba(15,23,42,.05);}
  td.cell:last-child{border-right:none;}
  .cell input{
    width:100%; border:none; background:transparent; text-align:right;
    font:inherit; font-variant-numeric:tabular-nums; color:var(--slate-900);
    padding:12px 16px 12px 8px; outline:none; transition:background .12s ease;
  }
  .cell input:hover{background:rgba(124,58,237,.035);}
  .cell input:focus,.col-head input:focus,.row-head input:focus{
    background:var(--violet-50);
    box-shadow:inset 0 0 0 2px var(--violet-500); border-radius:6px;
  }

  /* add row / col affordances */
  .grid-tools{display:flex; gap:9px; margin-top:11px;}
  .ghost{
    flex:1; display:inline-flex; align-items:center; justify-content:center; gap:7px;
    height:40px; border-radius:12px; border:1px dashed var(--slate-300);
    background:transparent; color:var(--slate-600); font-size:14px; font-weight:500;
    cursor:pointer; transition:all .15s ease;
  }
  .ghost:hover{border-color:var(--violet-500); color:var(--violet-600); background:var(--violet-50);}
  .ghost svg{width:16px;height:16px;}

  /* row delete handle (revealed on row hover) */
  .row-del{
    position:absolute; left:-9px; top:50%; transform:translateY(-50%);
    width:20px; height:20px; border-radius:50%; border:1px solid var(--slate-200);
    background:#fff; color:var(--slate-400); display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transition:opacity .14s ease; box-shadow:0 1px 3px rgba(15,23,42,.1);
  }
  tr.body-row:hover .row-del{opacity:1;}
  .row-del:hover{color:var(--foxit); border-color:var(--foxit);}

  /* ───────── Controls (segmented + select) ───────── */
  .ctl-row{display:flex; flex-direction:column; gap:7px; margin-bottom:16px;}
  .ctl-row:last-child{margin-bottom:0;}
  .ctl-label{font-size:13px; font-weight:500; color:var(--slate-600);}
  .seg{display:flex; gap:6px; background:var(--slate-100); padding:4px; border-radius:12px;}
  .seg button{
    flex:1; height:38px; border:none; border-radius:9px; background:transparent;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
    font-size:13px; font-weight:600; color:var(--slate-500); transition:all .15s ease;
  }
  .seg button svg{width:17px; height:17px;}
  .seg button.active{background:#fff; color:var(--violet-600); box-shadow:0 1px 3px rgba(15,23,42,.1);}
  .seg button:not(.active):hover{color:var(--slate-700);}

  .select-shell{position:relative;}
  .select-shell select{
    width:100%; height:44px; border:1px solid var(--slate-200); border-radius:12px;
    background:#fff; padding:0 40px 0 14px; font:inherit; font-size:14px; font-weight:500;
    color:var(--slate-800); appearance:none; cursor:pointer; outline:none;
  }
  .select-shell select:focus{border-color:var(--violet-500); box-shadow:0 0 0 3px rgba(124,58,237,.14);}
  .select-shell .chev{position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--slate-400);}

  /* paste hint */
  .paste-hint{
    display:flex; align-items:flex-start; gap:9px; margin-top:13px;
    background:linear-gradient(90deg,rgba(124,58,237,.05),rgba(96,165,250,.05));
    border:1px solid rgba(124,58,237,.1); border-radius:12px; padding:11px 13px;
  }
  .paste-hint svg{flex:none; width:17px; height:17px; color:var(--violet-600); margin-top:1px;}
  .paste-hint p{font-size:13px; line-height:1.45; color:var(--slate-600);}
  .paste-hint kbd{
    font-family:inherit; font-size:12px; font-weight:600; background:#fff; border:1px solid var(--slate-200);
    border-bottom-width:2px; border-radius:6px; padding:1px 6px; color:var(--slate-700);
  }

  .footer-cta{padding:16px 22px 26px;}
  .btn-cta-bold{
    display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%;
    height:44px; padding:0 14px; border-radius:10px; border:none; cursor:pointer;
    background:linear-gradient(90deg,#E267E4 0%,#9FC7FE 50%,#4198FF 100%);
    color:#2e1065; font-size:14px; font-weight:600; box-shadow:0 4px 16px rgba(65,152,255,.28);
  }
  .btn-cta-bold svg{width:16px;height:16px;}
</style>
</head>
<body>

  <!-- ░░░ SLIDE CANVAS CONTEXT ░░░ -->
  <main class="stage">
    <div class="slide">
      <div class="slide-kicker">Revenue · FY Comparison</div>
      <div class="slide-title">Quarterly growth held through 2026</div>
      <div class="slide-chart-frame">
        <div class="selected-tag">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
          Chart selected
        </div>
        <!-- compact echo of the same chart -->
        <svg viewBox="0 0 520 200" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet" id="bigChart"></svg>
      </div>
    </div>
  </main>

  <!-- ░░░ SLIDE INSPECTOR ░░░ -->
  <aside class="inspector">
    <div class="insp-head">
      <div class="insp-eyebrow"><span class="dot"></span> Chart data</div>
      <div class="insp-title">Edit the numbers</div>
      <div class="insp-sub">Type in the grid — the chart updates live.</div>
    </div>

    <!-- LIVE PREVIEW -->
    <div class="section">
      <div class="sec-label">Preview</div>
      <div class="preview-card">
        <div class="pv-title">Quarterly revenue</div>
        <div class="pv-legend">
          <span class="pv-leg"><i style="background:var(--s1)"></i>2025</span>
          <span class="pv-leg"><i style="background:var(--s2)"></i>2026</span>
        </div>
        <svg viewBox="0 0 300 150" style="width:100%;height:150px;" id="pvChart"></svg>
      </div>
    </div>

    <!-- DATA GRID -->
    <div class="section">
      <div class="sec-label">Data</div>
      <div class="grid-wrap">
        <table class="grid">
          <thead>
            <tr>
              <th class="corner"></th>
              <th class="col-head">
                <div class="col-dot"><i style="background:var(--s1)"></i></div>
                <input value="2025" aria-label="Series 1 name" />
              </th>
              <th class="col-head">
                <div class="col-dot"><i style="background:var(--s2)"></i></div>
                <input value="2026" aria-label="Series 2 name" />
              </th>
            </tr>
          </thead>
          <tbody id="grid-body"><!-- rows injected --></tbody>
        </table>
      </div>

      <div class="grid-tools">
        <button class="ghost" aria-label="Add row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Add row
        </button>
        <button class="ghost" aria-label="Add column">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Add column
        </button>
      </div>

      <div class="paste-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
        <p>Paste straight from Excel or Sheets — <kbd>⌘V</kbd> over the grid replaces the data.</p>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="section">
      <div class="sec-label">Format</div>

      <div class="ctl-row">
        <span class="ctl-label">Chart type</span>
        <div class="seg">
          <button class="active" title="Column">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 20V10M12 20V4M19 20v-7"/></svg>
          </button>
          <button title="Bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h12M4 12h8M4 17h16"/></svg>
          </button>
          <button title="Line">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l5-6 4 3 8-9"/></svg>
          </button>
          <button title="Pie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12z"/><path d="M12 2v10h10"/></svg>
          </button>
        </div>
      </div>

      <div class="ctl-row">
        <span class="ctl-label">Number format</span>
        <div class="select-shell">
          <select>
            <option>Number — 1,234</option>
            <option>Currency — $1,234</option>
            <option>Percent — 12.3%</option>
            <option>Compact — 1.2K</option>
          </select>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </div>

    <div class="footer-cta">
      <button class="btn-cta-bold">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Done
      </button>
    </div>
  </aside>

<script>
  // ── Sample data (per brief) ──
  const data = {
    categories:['Q1','Q2','Q3','Q4'],
    series:[
      {name:'2025', values:[120,135,150,162], color:'#7c3aed'},
      {name:'2026', values:[140,158,171,195], color:'#60a5fa'},
    ]
  };

  // ── Build the editable grid rows ──
  const body = document.getElementById('grid-body');
  data.categories.forEach((cat,r)=>{
    const tr = document.createElement('tr');
    tr.className = 'body-row';
    tr.innerHTML = `
      <td class="row-head">
        <button class="row-del" title="Remove row">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
        </button>
        <input value="${cat}" aria-label="Row label ${r+1}" />
      </td>
      ${data.series.map((s,c)=>`<td class="cell"><input value="${s.values[r]}" inputmode="numeric" aria-label="${s.name} ${cat}" /></td>`).join('')}
    `;
    body.appendChild(tr);
  });

  // ── Grouped-column chart renderer (real inline SVG) ──
  function drawColumns(svg, w, h, pad, labels){
    const all = data.series.flatMap(s=>s.values);
    const max = Math.max(...all)*1.12;
    const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
    const n = data.categories.length, m = data.series.length;
    const groupW = plotW/n, barGap = 4, groupPad = groupW*0.22;
    const barW = (groupW - groupPad*2 - barGap*(m-1))/m;
    let svgStr = '';

    // gridlines + y labels
    const ticks = 4;
    for(let i=0;i<=ticks;i++){
      const v = max/ticks*i;
      const y = pad.t + plotH - (v/max)*plotH;
      svgStr += `<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#eef0f5" stroke-width="1"/>`;
      if(labels) svgStr += `<text x="${pad.l-8}" y="${y+3.5}" font-size="9" fill="#94a3b8" text-anchor="end" font-family="Inter">${Math.round(v)}</text>`;
    }

    data.categories.forEach((cat,ci)=>{
      const gx = pad.l + groupW*ci + groupPad;
      data.series.forEach((s,si)=>{
        const val = s.values[ci];
        const bh = (val/max)*plotH;
        const x = gx + si*(barW+barGap);
        const y = pad.t + plotH - bh;
        const rx = Math.min(4, barW/3);
        svgStr += `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="${rx}" fill="${s.color}"><animate attributeName="height" from="0" to="${bh}" dur="0.5s" fill="freeze"/><animate attributeName="y" from="${pad.t+plotH}" to="${y}" dur="0.5s" fill="freeze"/></rect>`;
      });
      if(labels){
        const cx = pad.l + groupW*ci + groupW/2;
        svgStr += `<text x="${cx}" y="${h-pad.b+15}" font-size="10" fill="#64748b" text-anchor="middle" font-family="Inter" font-weight="500">${cat}</text>`;
      }
    });
    svg.innerHTML = svgStr;
  }

  drawColumns(document.getElementById('pvChart'), 300, 150, {l:26,r:6,t:8,b:22}, true);
  drawColumns(document.getElementById('bigChart'), 520, 200, {l:34,r:12,t:14,b:28}, true);
</script>
</body>
</html>
