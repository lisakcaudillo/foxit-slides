<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chart Data-Table Editor — Round 2 · Manager Recommendation (Bottom Dock)</title>
<style>
  :root{
    --slate-900:#0f172a; --slate-800:#1e293b; --slate-700:#334155;
    --slate-600:#475569; --slate-500:#64748b; --slate-400:#94a3b8;
    --slate-300:#cbd5e1; --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
    --violet-600:#7c3aed; --violet-500:#8b5cf6; --violet-100:#ede9fe; --violet-50:#f5f3ff;
    --foxit:#FF5F00; --foxit-50:#fff4ec;
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(180deg,#f9f6ff 0%,#f4f0ff 40%,#eef3ff 100%);
    color:var(--slate-900); -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }

  /* ───────── Slide canvas (stays visible above the dock) ───────── */
  .stage{
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:34px 40px 22px; min-height:0;
  }
  .slide{
    width:100%; max-width:760px; aspect-ratio:16/9; max-height:100%;
    background:#ffffff; border-radius:18px;
    box-shadow:0 1px 3px rgba(15,23,42,.05),0 26px 60px rgba(99,102,241,.12);
    border:1px solid rgba(15,23,42,.05);
    padding:38px 48px; position:relative; overflow:hidden;
  }
  .slide-kicker{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--violet-600);}
  .slide-title{font-size:28px;font-weight:700;line-height:1.15;margin-top:8px;color:var(--slate-900);letter-spacing:-.02em;}
  .slide-chart-frame{
    margin-top:18px; height:62%; border-radius:14px;
    background:linear-gradient(180deg,#fdfcff,#f7f5ff);
    border:1.5px solid var(--violet-600); outline:3px solid rgba(124,58,237,.12);
    padding:16px 22px; position:relative;
  }
  .selected-tag{
    position:absolute; top:-11px; left:18px; background:var(--violet-600); color:#fff;
    font-size:11px; font-weight:600; letter-spacing:.04em; padding:3px 9px; border-radius:7px;
    display:flex; align-items:center; gap:5px;
  }

  /* ───────── Bottom dock ───────── */
  .dock{
    flex:none; height:344px;
    background:rgba(255,255,255,.86);
    backdrop-filter:blur(18px) saturate(1.05); -webkit-backdrop-filter:blur(18px) saturate(1.05);
    border-top:1px solid rgba(15,23,42,.08);
    box-shadow:0 -1px 0 rgba(255,255,255,.7),0 -24px 60px rgba(99,102,241,.07);
    display:flex; flex-direction:column;
  }
  .dock-grip{
    height:14px; flex:none; display:flex; align-items:center; justify-content:center; cursor:ns-resize;
  }
  .dock-grip span{width:38px; height:4px; border-radius:99px; background:var(--slate-300);}

  .dock-head{
    flex:none; display:flex; align-items:center; gap:14px;
    padding:2px 24px 14px; border-bottom:1px solid rgba(15,23,42,.06);
  }
  .dh-eyebrow{display:flex; align-items:center; gap:8px;}
  .dh-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--violet-600);box-shadow:0 0 0 3px rgba(124,58,237,.16);}
  .dh-eyebrow b{font-size:13px; font-weight:600; color:var(--violet-600);}
  .dh-title{font-size:17px; font-weight:700; color:var(--slate-900); letter-spacing:-.01em;}
  .dh-sub{font-size:14px; color:var(--slate-500);}
  .dh-spacer{flex:1;}
  .dh-x{
    width:34px; height:34px; border-radius:10px; border:1px solid var(--slate-200); background:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--slate-500);
    transition:all .15s ease;
  }
  .dh-x:hover{border-color:var(--slate-300); color:var(--slate-700); background:var(--slate-50);}
  .btn-done{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    height:40px; padding:0 18px; border-radius:10px; border:none; cursor:pointer;
    background:linear-gradient(90deg,#E267E4 0%,#9FC7FE 50%,#4198FF 100%);
    color:#2e1065; font-size:14px; font-weight:600; box-shadow:0 4px 16px rgba(65,152,255,.26);
  }
  .btn-done svg{width:16px;height:16px;}

  /* dock body = grid (left, grows) + controls rail (right, fixed) */
  .dock-body{flex:1; display:flex; min-height:0;}

  /* ───────── Data grid region ───────── */
  .grid-region{
    flex:1; min-width:0; padding:16px 18px 18px 24px; display:flex; flex-direction:column;
  }
  .grid-region .region-head{
    display:flex; align-items:center; gap:10px; margin-bottom:11px;
  }
  .region-label{
    font-size:12px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--slate-400);
  }
  .paste-pill{
    margin-left:auto; display:inline-flex; align-items:center; gap:7px;
    font-size:13px; color:var(--slate-500); background:linear-gradient(90deg,rgba(124,58,237,.05),rgba(96,165,250,.05));
    border:1px solid rgba(124,58,237,.1); border-radius:9px; padding:5px 10px;
  }
  .paste-pill svg{width:15px;height:15px;color:var(--violet-600);}
  .paste-pill kbd{
    font-family:inherit; font-size:12px; font-weight:600; background:#fff; border:1px solid var(--slate-200);
    border-bottom-width:2px; border-radius:6px; padding:1px 6px; color:var(--slate-700);
  }

  /* horizontal-scroll shell — row labels pin, series scroll */
  .grid-scroll{
    flex:1; overflow:auto; border:1px solid rgba(15,23,42,.08); border-radius:14px;
    background:#fff; box-shadow:0 1px 2px rgba(15,23,42,.03);
  }
  table.grid{border-collapse:separate; border-spacing:0; font-size:15px; width:max-content; min-width:100%;}
  .grid th,.grid td{padding:0; position:relative;}

  /* sticky corner + sticky row-label column */
  .corner{
    width:150px; min-width:150px; position:sticky; left:0; top:0; z-index:6;
    background:linear-gradient(180deg,#faf9ff,#f4f1fb);
    border-bottom:1px solid rgba(15,23,42,.07); border-right:1px solid rgba(15,23,42,.07);
  }
  .corner-inner{display:flex; align-items:center; padding:0 14px; height:100%; font-size:13px; font-weight:600; color:var(--slate-500);}

  thead th.col-head{
    position:sticky; top:0; z-index:4; min-width:128px;
    background:linear-gradient(180deg,#faf9ff,#f4f1fb);
    border-bottom:1px solid rgba(15,23,42,.07);
  }
  thead th.col-head:not(:last-child){border-right:1px solid rgba(15,23,42,.05);}
  .col-head-inner{padding:8px 8px 9px; position:relative;}
  .col-dot{display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:5px;}
  .col-dot i{width:10px; height:10px; border-radius:3px;}
  .col-head input{
    width:100%; border:none; background:transparent; text-align:center;
    font:inherit; font-weight:600; color:var(--slate-700); padding:6px 4px;
    outline:none; letter-spacing:-.005em; border-radius:7px;
  }
  /* column delete (revealed on header hover) */
  .col-del{
    position:absolute; top:3px; right:5px;
    width:19px; height:19px; border-radius:6px; border:1px solid var(--slate-200);
    background:#fff; color:var(--slate-400); display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transition:opacity .14s ease; box-shadow:0 1px 2px rgba(15,23,42,.08);
  }
  thead th.col-head:hover .col-del{opacity:1;}
  .col-del:hover{color:var(--foxit); border-color:var(--foxit);}

  /* add-column header cell — slim, dashed */
  th.add-col-head{
    min-width:52px; width:52px; position:sticky; top:0; z-index:4;
    background:linear-gradient(180deg,#faf9ff,#f4f1fb);
    border-bottom:1px solid rgba(15,23,42,.07); border-left:1px dashed var(--slate-300);
  }
  .add-col-btn{
    width:100%; height:100%; min-height:54px; border:none; background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:var(--slate-400);
    transition:all .15s ease;
  }
  .add-col-btn:hover{color:var(--violet-600); background:var(--violet-50);}
  .add-col-btn svg{width:18px;height:18px;}

  td.row-head{
    position:sticky; left:0; z-index:3; width:150px; min-width:150px;
    background:linear-gradient(90deg,#faf9ff,#f6f4fc);
    border-right:1px solid rgba(15,23,42,.07);
    border-top:1px solid rgba(15,23,42,.05);
  }
  .row-head-inner{display:flex; align-items:center; padding-left:6px;}
  .row-head input{
    width:100%; border:none; background:transparent; font:inherit; font-weight:600;
    color:var(--slate-700); padding:13px 12px; outline:none; border-radius:7px;
  }
  .row-del{
    flex:none; width:21px; height:21px; border-radius:50%; border:1px solid var(--slate-200);
    background:#fff; color:var(--slate-400); display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transition:opacity .14s ease; box-shadow:0 1px 3px rgba(15,23,42,.1);
  }
  tr.body-row:hover .row-del{opacity:1;}
  .row-del:hover{color:var(--foxit); border-color:var(--foxit);}

  td.cell{border-top:1px solid rgba(15,23,42,.05); border-right:1px solid rgba(15,23,42,.05); min-width:128px;}
  td.cell.add-col-pad{border-right:none; background:rgba(248,247,255,.4);}
  .cell input{
    width:100%; border:none; background:transparent; text-align:right;
    font:inherit; font-variant-numeric:tabular-nums; color:var(--slate-900);
    padding:13px 18px 13px 10px; outline:none; transition:background .12s ease;
  }
  .cell input:hover{background:rgba(124,58,237,.035);}
  .cell input:focus,.col-head input:focus,.row-head input:focus{
    background:var(--violet-50);
    box-shadow:inset 0 0 0 2px var(--violet-500); border-radius:6px;
  }
  .cell input.coerced{background:var(--foxit-50); box-shadow:inset 0 0 0 1.5px var(--foxit);}

  /* add-row strip pinned under the grid */
  .add-row-bar{flex:none; margin-top:10px;}
  .ghost{
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    height:40px; padding:0 16px; border-radius:12px; border:1px dashed var(--slate-300);
    background:transparent; color:var(--slate-600); font-size:14px; font-weight:500;
    cursor:pointer; transition:all .15s ease;
  }
  .ghost:hover{border-color:var(--violet-500); color:var(--violet-600); background:var(--violet-50);}
  .ghost svg{width:16px;height:16px;}

  /* ───────── Controls rail (right) ───────── */
  .ctl-rail{
    flex:none; width:316px; border-left:1px solid rgba(15,23,42,.06);
    padding:16px 22px; overflow-y:auto;
    background:rgba(252,251,255,.5);
  }
  .ctl-rail .region-label{margin-bottom:13px; display:block;}
  .ctl-row{display:flex; flex-direction:column; gap:8px; margin-bottom:18px;}
  .ctl-row:last-child{margin-bottom:0;}
  .ctl-label{font-size:14px; font-weight:500; color:var(--slate-600);}

  .seg{display:flex; gap:6px; background:var(--slate-100); padding:4px; border-radius:12px;}
  .seg button{
    flex:1; height:42px; border:none; border-radius:9px; background:transparent;
    cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    font-size:11px; font-weight:600; color:var(--slate-500); transition:all .15s ease;
  }
  .seg button svg{width:18px; height:18px;}
  .seg button.active{background:#fff; color:var(--violet-600); box-shadow:0 1px 3px rgba(15,23,42,.1);}
  .seg button:not(.active):hover{color:var(--slate-700);}

  .select-shell{position:relative;}
  .select-shell select{
    width:100%; height:46px; border:1px solid var(--slate-200); border-radius:12px;
    background:#fff; padding:0 40px 0 14px; font:inherit; font-size:15px; font-weight:500;
    color:var(--slate-800); appearance:none; cursor:pointer; outline:none;
  }
  .select-shell select:focus{border-color:var(--violet-500); box-shadow:0 0 0 3px rgba(124,58,237,.14);}
  .select-shell .chev{position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--slate-400);}

  .fmt-preview{
    margin-top:9px; font-size:13px; color:var(--slate-500);
    display:flex; align-items:center; gap:7px;
  }
  .fmt-preview b{color:var(--slate-700); font-weight:600; font-variant-numeric:tabular-nums;}

  /* ───────── Coercion toast ───────── */
  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    display:flex; align-items:center; gap:11px; padding:13px 18px;
    background:var(--slate-900); color:#fff; border-radius:13px;
    box-shadow:0 12px 40px rgba(15,23,42,.3); font-size:14px; font-weight:500;
    opacity:0; pointer-events:none; transition:all .3s cubic-bezier(.16,1,.3,1); z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast .ico{
    width:24px; height:24px; border-radius:7px; flex:none; display:flex; align-items:center; justify-content:center;
    background:var(--foxit); color:#fff;
  }
  .toast .ico svg{width:15px;height:15px;}
  .toast .x{margin-left:6px; color:var(--slate-400); cursor:pointer; display:flex;}
  .toast .x:hover{color:#fff;}
</style>
</head>
<body>

  <!-- ░░░ SLIDE CANVAS (stays visible) ░░░ -->
  <main class="stage">
    <div class="slide">
      <div class="slide-kicker">Regional Revenue · FY2026</div>
      <div class="slide-title">Six regions, four quarters of momentum</div>
      <div class="slide-chart-frame">
        <div class="selected-tag">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
          Chart selected
        </div>
        <svg viewBox="0 0 660 220" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet" id="bigChart"></svg>
      </div>
    </div>
  </main>

  <!-- ░░░ BOTTOM DOCK — DATA EDITOR ░░░ -->
  <section class="dock" id="dock">
    <div class="dock-grip"><span></span></div>

    <div class="dock-head">
      <div class="dh-eyebrow"><span class="dot"></span><b>Chart data</b></div>
      <div class="dh-title">Edit the numbers</div>
      <div class="dh-sub">Type in the grid — the chart updates live.</div>
      <div class="dh-spacer"></div>
      <button class="btn-done">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
        Done
      </button>
      <button class="dh-x" title="Close" aria-label="Close data editor">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="dock-body">

      <!-- GRID -->
      <div class="grid-region">
        <div class="region-head">
          <span class="region-label">Data</span>
          <span class="paste-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
            Paste from Excel — <kbd>⌘V</kbd> over the grid replaces the data
          </span>
        </div>

        <div class="grid-scroll" id="grid-scroll">
          <table class="grid">
            <thead>
              <tr id="head-row">
                <th class="corner"><div class="corner-inner">Category</div></th>
                <!-- series headers injected -->
                <th class="add-col-head">
                  <button class="add-col-btn" id="add-col" title="Add column" aria-label="Add column">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody id="grid-body"><!-- rows injected --></tbody>
          </table>
        </div>

        <div class="add-row-bar">
          <button class="ghost" id="add-row" aria-label="Add row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Add row
          </button>
        </div>
      </div>

      <!-- CONTROLS RAIL -->
      <aside class="ctl-rail">
        <span class="region-label">Format</span>

        <div class="ctl-row">
          <span class="ctl-label">Chart type</span>
          <div class="seg" id="type-seg">
            <button class="active" data-type="column" title="Grouped column">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 20V10M12 20V4M19 20v-7"/></svg>
              Column
            </button>
            <button data-type="bar" title="Bar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h12M4 12h8M4 17h16"/></svg>
              Bar
            </button>
            <button data-type="line" title="Line">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l5-6 4 3 8-9"/></svg>
              Line
            </button>
            <button data-type="pie" title="Pie">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12z"/><path d="M12 2v10h10"/></svg>
              Pie
            </button>
          </div>
        </div>

        <div class="ctl-row">
          <span class="ctl-label">Number format</span>
          <div class="select-shell">
            <select id="fmt-select">
              <option value="number">Number — 1,234</option>
              <option value="currency">Currency — $1,234</option>
              <option value="percent">Percent — 12.3%</option>
              <option value="compact">Compact — 1.2K</option>
            </select>
            <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div class="fmt-preview">Sample: <b id="fmt-sample">1,234</b></div>
        </div>
      </aside>

    </div>
  </section>

  <!-- coercion toast -->
  <div class="toast" id="toast">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.42 0z"/></svg></span>
    <span id="toast-msg">2 non-numeric cells set to 0.</span>
    <span class="x" onclick="hideToast()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
  </div>

<script>
  // ── Sample data (per brief — 6 series, 4 categories) ──
  const PALETTE = ['#7c3aed','#60a5fa','#FF5F00','#10b981','#f59e0b','#ec4899','#06b6d4','#8b5cf6'];
  const data = {
    categories:['Q1','Q2','Q3','Q4'],
    chartType:'column',
    numberFormat:'number',
    series:[
      {name:'North',   values:[120,135,150,162]},
      {name:'South',   values:[98,110,121,130]},
      {name:'East',    values:[140,158,171,195]},
      {name:'West',    values:[88,95,103,118]},
      {name:'Central', values:[112,120,128,141]},
      {name:'Online',  values:[60,82,99,130]},
    ]
  };
  data.series.forEach((s,i)=> s.color = s.color || PALETTE[i % PALETTE.length]);

  const $ = sel => document.querySelector(sel);
  const headRow = $('#head-row');
  const body = $('#grid-body');
  const addColTh = headRow.querySelector('.add-col-head');

  // ── Render the whole grid from the model ──
  function renderGrid(){
    // headers
    headRow.querySelectorAll('.col-head').forEach(n=>n.remove());
    data.series.forEach((s,c)=>{
      const th = document.createElement('th');
      th.className = 'col-head';
      th.innerHTML = `
        <div class="col-head-inner">
          <button class="col-del" title="Remove column" data-col="${c}">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
          </button>
          <div class="col-dot"><i style="background:${s.color}"></i></div>
          <input value="${s.name}" data-col="${c}" data-kind="series-name" aria-label="Series ${c+1} name" />
        </div>`;
      headRow.insertBefore(th, addColTh);
    });

    // rows
    body.innerHTML = '';
    data.categories.forEach((cat,r)=>{
      const tr = document.createElement('tr');
      tr.className = 'body-row';
      let cells = data.series.map((s,c)=>
        `<td class="cell"><input value="${s.values[r]}" inputmode="numeric" data-row="${r}" data-col="${c}" data-kind="value" aria-label="${s.name} ${cat}" /></td>`
      ).join('');
      tr.innerHTML = `
        <td class="row-head">
          <div class="row-head-inner">
            <button class="row-del" title="Remove row" data-row="${r}">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
            </button>
            <input value="${cat}" data-row="${r}" data-kind="category" aria-label="Row label ${r+1}" />
          </div>
        </td>
        ${cells}
        <td class="cell add-col-pad"></td>`;
      body.appendChild(tr);
    });

    bindCells();
    redraw();
  }

  // ── Wire inputs + delete buttons (event delegation kept simple here) ──
  function bindCells(){
    body.querySelectorAll('input[data-kind="value"]').forEach(inp=>{
      inp.addEventListener('input', e=>{
        const r=+e.target.dataset.row, c=+e.target.dataset.col;
        const raw = e.target.value.trim();
        const num = raw==='' ? 0 : Number(raw.replace(/[^0-9.\-]/g,''));
        const valid = raw==='' || !isNaN(Number(raw));
        e.target.classList.toggle('coerced', raw!=='' && !valid);
        data.series[c].values[r] = isNaN(num) ? 0 : num;
        redraw();
      });
    });
    body.querySelectorAll('input[data-kind="category"]').forEach(inp=>{
      inp.addEventListener('input', e=>{ data.categories[+e.target.dataset.row] = e.target.value; });
    });
    headRow.querySelectorAll('input[data-kind="series-name"]').forEach(inp=>{
      inp.addEventListener('input', e=>{ data.series[+e.target.dataset.col].name = e.target.value; });
    });
    body.querySelectorAll('.row-del').forEach(b=>{
      b.addEventListener('click', ()=> removeRow(+b.dataset.row));
    });
    headRow.querySelectorAll('.col-del').forEach(b=>{
      b.addEventListener('click', ()=> removeCol(+b.dataset.col));
    });
  }

  // ── Invariant-preserving mutators ──
  function addRow(){
    data.categories.push('Q'+(data.categories.length+1));
    data.series.forEach(s=> s.values.push(0));   // keep every series the same length
    renderGrid();
  }
  function removeRow(r){
    if(data.categories.length<=1) return;        // never delete the last row
    data.categories.splice(r,1);
    data.series.forEach(s=> s.values.splice(r,1));
    renderGrid();
  }
  function addCol(){
    const i = data.series.length;
    data.series.push({name:'Series '+(i+1), values:Array(data.categories.length).fill(0), color:PALETTE[i%PALETTE.length]});
    renderGrid();
    // scroll the new column into view
    requestAnimationFrame(()=>{ $('#grid-scroll').scrollLeft = $('#grid-scroll').scrollWidth; });
  }
  function removeCol(c){
    if(data.series.length<=1) return;            // never delete the last column
    data.series.splice(c,1);
    renderGrid();
  }

  $('#add-row').addEventListener('click', addRow);
  $('#add-col').addEventListener('click', addCol);

  // ── Paste from Excel/Sheets (TSV, comma fallback) ──
  $('#grid-scroll').addEventListener('paste', e=>{
    const text = (e.clipboardData||window.clipboardData).getData('text/plain');
    if(!text || !/[\t,\n]/.test(text)) return;   // single value → normal cell paste
    e.preventDefault();
    const rows = text.replace(/\r/g,'').split('\n').filter(l=>l.length);
    const delim = rows[0].includes('\t') ? '\t' : ',';
    const matrix = rows.map(l=>l.split(delim));
    const header = matrix[0];
    let coerced = 0;

    // first row → series names (skip the corner cell), first col → categories
    const newSeriesNames = header.slice(1).map(h=>h.trim()||'Series');
    const newCats=[], newValues = newSeriesNames.map(()=>[]);
    for(let r=1;r<matrix.length;r++){
      newCats.push((matrix[r][0]||'').trim()||('Row '+r));
      for(let c=0;c<newSeriesNames.length;c++){
        const raw = (matrix[r][c+1]||'').trim();
        const n = Number(raw.replace(/[^0-9.\-]/g,''));
        if(raw!=='' && isNaN(Number(raw))) coerced++;
        newValues[c].push(isNaN(n)?0:n);
      }
    }
    data.categories = newCats;
    data.series = newSeriesNames.map((name,c)=>({name, values:newValues[c], color:PALETTE[c%PALETTE.length]}));
    renderGrid();
    if(coerced>0) showToast(`${coerced} non-numeric cell${coerced>1?'s':''} set to 0.`);
    else showToast(`Pasted ${newCats.length} rows × ${newSeriesNames.length} columns.`, true);
  });

  // ── Chart-type segmented picker ──
  $('#type-seg').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    $('#type-seg').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    data.chartType = b.dataset.type;
    redraw();
  });

  // ── Number format ──
  const fmtSample = $('#fmt-sample');
  function fmtNum(v, f){
    const n = Math.round(v);
    if(f==='currency') return '$'+n.toLocaleString();
    if(f==='percent')  return (v).toFixed(1)+'%';
    if(f==='compact')  return n>=1000 ? (n/1000).toFixed(1)+'K' : ''+n;
    return n.toLocaleString();
  }
  $('#fmt-select').addEventListener('change', e=>{
    data.numberFormat = e.target.value;
    fmtSample.textContent = fmtNum(1234, data.numberFormat);
    redraw();
  });

  // ── Chart renderers (real inline SVG, model-driven) ──
  function redraw(){
    drawChart(document.getElementById('bigChart'), 660, 220, {l:42,r:16,t:16,b:30});
  }
  function drawChart(svg, w, h, pad){
    if(data.chartType==='line') return drawLines(svg,w,h,pad);
    if(data.chartType==='pie')  return drawPie(svg,w,h);
    drawColumns(svg,w,h,pad,data.chartType==='bar');
  }

  function yAxis(svgArr, max, pad, w, plotH){
    const ticks=4;
    for(let i=0;i<=ticks;i++){
      const v=max/ticks*i, y=pad.t+plotH-(v/max)*plotH;
      svgArr.push(`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#eef0f5" stroke-width="1"/>`);
      svgArr.push(`<text x="${pad.l-8}" y="${y+3.5}" font-size="9" fill="#94a3b8" text-anchor="end" font-family="Inter">${fmtNum(v,data.numberFormat)}</text>`);
    }
  }

  function drawColumns(svg,w,h,pad,horizontal){
    const all=data.series.flatMap(s=>s.values);
    const max=Math.max(1,Math.max(...all))*1.12;
    const plotW=w-pad.l-pad.r, plotH=h-pad.t-pad.b;
    const n=data.categories.length, m=data.series.length;
    const groupW=plotW/n, barGap=2, groupPad=groupW*0.16;
    const barW=Math.max(2,(groupW-groupPad*2-barGap*(m-1))/m);
    const out=[]; yAxis(out,max,pad,w,plotH);
    data.categories.forEach((cat,ci)=>{
      const gx=pad.l+groupW*ci+groupPad;
      data.series.forEach((s,si)=>{
        const val=s.values[ci], bh=(val/max)*plotH;
        const x=gx+si*(barW+barGap), y=pad.t+plotH-bh, rx=Math.min(3,barW/3);
        out.push(`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="${rx}" fill="${s.color}"><animate attributeName="height" from="0" to="${bh}" dur="0.45s" fill="freeze"/><animate attributeName="y" from="${pad.t+plotH}" to="${y}" dur="0.45s" fill="freeze"/></rect>`);
      });
      const cx=pad.l+groupW*ci+groupW/2;
      out.push(`<text x="${cx}" y="${h-pad.b+15}" font-size="10" fill="#64748b" text-anchor="middle" font-family="Inter" font-weight="500">${cat}</text>`);
    });
    svg.innerHTML=out.join('');
  }

  function drawLines(svg,w,h,pad){
    const all=data.series.flatMap(s=>s.values);
    const max=Math.max(1,Math.max(...all))*1.12;
    const plotW=w-pad.l-pad.r, plotH=h-pad.t-pad.b;
    const n=data.categories.length;
    const xAt=i=> pad.l + (n===1?plotW/2:(plotW/(n-1))*i);
    const yAt=v=> pad.t+plotH-(v/max)*plotH;
    const out=[]; yAxis(out,max,pad,w,plotH);
    data.series.forEach(s=>{
      const pts=s.values.map((v,i)=>`${xAt(i)},${yAt(v)}`).join(' ');
      out.push(`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`);
      s.values.forEach((v,i)=> out.push(`<circle cx="${xAt(i)}" cy="${yAt(v)}" r="3" fill="#fff" stroke="${s.color}" stroke-width="2"/>`));
    });
    data.categories.forEach((cat,i)=> out.push(`<text x="${xAt(i)}" y="${h-pad.b+15}" font-size="10" fill="#64748b" text-anchor="middle" font-family="Inter" font-weight="500">${cat}</text>`));
    svg.innerHTML=out.join('');
  }

  function drawPie(svg,w,h){
    // pie uses first series' values across categories
    const vals=data.series[0].values, total=vals.reduce((a,b)=>a+b,0)||1;
    const cx=w*0.42, cy=h/2, R=Math.min(w,h)*0.36;
    let a0=-Math.PI/2; const out=[];
    vals.forEach((v,i)=>{
      const a1=a0+(v/total)*Math.PI*2;
      const x0=cx+R*Math.cos(a0), y0=cy+R*Math.sin(a0);
      const x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
      const large=(a1-a0)>Math.PI?1:0;
      out.push(`<path d="M${cx},${cy} L${x0},${y0} A${R},${R} 0 ${large} 1 ${x1},${y1} Z" fill="${PALETTE[i%PALETTE.length]}"/>`);
      a0=a1;
    });
    // legend
    data.categories.forEach((c,i)=>{
      const ly=cy-R+i*20;
      out.push(`<rect x="${cx+R+24}" y="${ly}" width="11" height="11" rx="3" fill="${PALETTE[i%PALETTE.length]}"/>`);
      out.push(`<text x="${cx+R+42}" y="${ly+10}" font-size="11" fill="#475569" font-family="Inter">${c}</text>`);
    });
    svg.innerHTML=out.join('');
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, neutral){
    const t=$('#toast'); $('#toast-msg').textContent=msg;
    t.querySelector('.ico').style.background = neutral ? '#7c3aed' : '#FF5F00';
    t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(hideToast,3600);
  }
  function hideToast(){ $('#toast').classList.remove('show'); }

  // ── Dock resize via grip (demonstrates the resizable affordance) ──
  (function(){
    const grip=document.querySelector('.dock-grip'), dock=$('#dock');
    let dragging=false, startY=0, startH=0;
    grip.addEventListener('mousedown', e=>{ dragging=true; startY=e.clientY; startH=dock.offsetHeight; document.body.style.userSelect='none'; });
    window.addEventListener('mousemove', e=>{ if(!dragging) return; const dh=startY-e.clientY; dock.style.height=Math.max(240,Math.min(560,startH+dh))+'px'; });
    window.addEventListener('mouseup', ()=>{ dragging=false; document.body.style.userSelect=''; });
  })();

  renderGrid();
</script>
</body>
</html>
